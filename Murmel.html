async function shareReport(id){
  const s=S.sessions.find(x=>x.id===id); if(!s) return;
  const g=computeGami(); const p=g.per.find(x=>x.id===id)||{pts:0,bd:{}}; const hl=sessionHighlights(id);
  const T=TYPES[s.type]; const col={push:"#FF453A",pull:"#0A84FF",legs:"#30D158"}[s.type];
  const W=1080,H=1080, cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  const x=cv.getContext("2d");
  x.fillStyle="#0D0F12"; x.fillRect(0,0,W,H);
  x.fillStyle=col; x.fillRect(0,0,W,18);
  x.textBaseline="alphabetic";
  x.fillStyle="#8B93A0"; x.font="34px -apple-system,Helvetica,sans-serif";
  x.fillText(T.label.toUpperCase()+" DAY · "+dLong(s.date)+(s.durationMin?" · "+s.durationMin+" min":""), 80, 150);
  x.fillStyle="#30D158"; x.font="bold 220px ui-monospace,Menlo,monospace"; x.fillText("+"+p.pts, 74, 400);
  x.fillStyle="#8B93A0"; x.font="40px -apple-system,sans-serif"; x.fillText("Punkte", 84, 460);
  // Breakdown
  let yy=580; x.font="36px -apple-system,sans-serif";
  const bd=p.bd||{};
  [["Konsistenz",bd.consistency],["Progression",bd.progression],["PRs",bd.pr],["Wochenziel",bd.weekly]].forEach(([n,v])=>{
    x.fillStyle="#8B93A0"; x.fillText(n, 84, yy);
    x.fillStyle=(v>0)?"#30D158":"#4E5560"; x.textAlign="right"; x.fillText("+"+(v||0), W-84, yy); x.textAlign="left"; yy+=58;
  });
  // PRs
  if(hl.prs.length){ yy+=20; x.fillStyle="#E8C547"; x.font="bold 40px -apple-system,sans-serif"; x.fillText("🏆 "+hl.prs.length+" neue"+(hl.prs.length===1?"r Rekord":" Rekorde"), 84, yy); yy+=56;
    x.font="32px -apple-system,sans-serif"; x.fillStyle="#EDEFF2";
    hl.prs.slice(0,4).forEach(pr=>{ x.fillText("· "+pr.name+": "+fmt(pr.val)+" "+pr.unit+(pr.unit==="kg"?" × "+pr.reps:""), 84, yy); yy+=46; });
  }
  // Footer
  x.fillStyle="#4E5560"; x.font="32px -apple-system,sans-serif"; x.fillText("Rang "+g.rank.name+" · "+fmt(g.total)+" P", 84, H-130);
  x.fillStyle="#8B93A0"; x.font="bold 36px -apple-system,sans-serif"; x.fillText("PPL · Murmel Tracker", 84, H-70);
  const blob=await new Promise(res=>cv.toBlob(res,"image/png"));
  if(!blob){ toast("Bild fehlgeschlagen"); return; }
  const file=new File([blob],"murmel-session.png",{type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:T.label+" Day"}); return; }catch(e){ if(e.name==="AbortError") return; }
  }
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="murmel-session.png"; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Bild gespeichert ✓");
}

async function exportData(){
  const json = JSON.stringify(S, null, 2);
  $("exportOut").style.display="block";
  $("exportTa").value = json;
  S.settings.lastBackup = new Date().toISOString(); save();
  try { await navigator.clipboard.writeText(json); toast("In Zwischenablage kopiert ✓"); }
  catch(e){ toast("Bitte manuell kopieren"); }
}
function setExRest(id,d){
  const ex=S.exercises[id];
  let v=(ex.restSeconds||S.settings.restSeconds)+d;
  if(v<=0 || v<15){ ex.restSeconds=null; } else { ex.restSeconds=v; }
  save(); render();
}
function importData(btn){
  const raw = ($("importTa").value||"").trim();
  if (!raw){ toast("Bitte JSON einfügen"); return; }
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch(e){ toast("Ungültiges JSON"); return; }
  if (!parsed || !parsed.sessions || !parsed.exercises){ toast("Kein gültiger Export"); return; }
  if (!btn.dataset.arm){ btn.dataset.arm="1"; btn.textContent="Alle Daten überschreiben? Nochmal tippen";
    setTimeout(()=>{ if(btn.isConnected){ delete btn.dataset.arm; btn.textContent="Daten importieren"; }}, 4000); return; }
  S = parsed; save(); toast("Daten importiert ✓"); go("home");
}
function runBodyCsvImport(text){
  if (!text || !text.trim()){ $("bodyCsvResult").textContent="Keine Daten gefunden."; return; }
  const res = importBodyCsv(text);
  if (res.fmt==="unknown"){ $("bodyCsvResult").textContent="Format nicht erkannt – RENPHO- oder Ultrahuman-CSV erwartet."; return; }
  save(); render();
  toast("Körperdaten importiert ✓");
}
function importBodyCsvFromTa(){
  runBodyCsvImport($("bodyCsvTa").value);
}
function handleBodyCsvFile(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => runBodyCsvImport(String(e.target.result||""));
  reader.onerror = () => { $("bodyCsvResult").textContent="Datei konnte nicht gelesen werden."; };
  reader.readAsText(file);
}

function togglePlan(t,id){
  const p=S.plan[t], i=p.indexOf(id);
  if (i>=0) p.splice(i,1); else p.push(id);

}

 if(el && el.type==='number'){

 }
