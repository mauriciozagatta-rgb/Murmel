<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060708">
<title>PPL Tracker</title>
<style>
:root{
  --bg:#060708; --card:#0D0F12; --card2:#14171B; --line:rgba(255,255,255,.07); --lineS:rgba(255,255,255,.12);
  --txt:#EDEFF2; --mut:#8B93A0; --dim:#4E5560;
  --push:#FF453A; --pull:#0A84FF; --legs:#30D158; --gold:#E8C547;
  --r:18px; --pad:16px;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  font-size:16px; overscroll-behavior:none;}
body{padding-bottom:calc(86px + env(safe-area-inset-bottom));}
#app{max-width:560px; margin:0 auto; padding:calc(14px + env(safe-area-inset-top)) var(--pad) 24px;}
h1{font-size:23px; font-weight:700; letter-spacing:-.01em; margin:8px 0 2px;}
h2{font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin:26px 0 10px;}
.sub{color:var(--dim); font-size:13px; margin:0 0 16px;}
.lbl{font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--dim);}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin-bottom:12px;
  animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion: reduce){ .card{animation:none;} }
.row{display:flex; align-items:center; gap:10px;}
.grow{flex:1; min-width:0;}
.mut{color:var(--mut); font-size:13px;}
.num{font-family:var(--mono); font-variant-numeric:tabular-nums;}
button{font:inherit; color:var(--txt); border:none; cursor:pointer; background:transparent;}
.btn{min-height:48px; border-radius:13px; padding:0 16px; font-weight:600; font-size:15px;
  background:transparent; border:1px solid var(--lineS); display:inline-flex; align-items:center; justify-content:center; gap:8px;}
.btn.full{width:100%;}
.btn.accent{background:var(--accA,rgba(255,255,255,.06)); border-color:var(--accB,var(--lineS)); color:var(--acc,var(--txt));}
.btn.ghost{border-color:transparent; color:var(--mut);}
.btn.danger{color:#FF7A70; border-color:rgba(255,69,58,.25);}
.btn:active{transform:scale(.97);} button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid #0A84FF;outline-offset:2px;}
.chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
  padding:4px 10px; border-radius:999px; border:1px solid var(--line); color:var(--mut);}
.dot{width:7px; height:7px; border-radius:50%;}
.pr{font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--gold);
  border:1px solid rgba(232,197,71,.45); padding:2px 7px; border-radius:7px;}
/* type theming */
.t-push{--acc:var(--push); --accA:rgba(255,69,58,.12); --accB:rgba(255,69,58,.35);}
.t-pull{--acc:var(--pull); --accA:rgba(10,132,255,.12); --accB:rgba(10,132,255,.35);}
.t-legs{--acc:var(--legs); --accA:rgba(48,209,88,.12); --accB:rgba(48,209,88,.35);}
.typecard{padding:18px 16px;}
.typecard .tname{font-size:17px; font-weight:700; display:flex; align-items:center; gap:9px;}
.typecard .tname .dot{width:9px; height:9px; background:var(--acc);}
/* steppers */
.step{display:flex; align-items:center; border:1px solid var(--line); border-radius:13px; overflow:hidden; background:rgba(255,255,255,.02);}
.step button{width:46px; height:52px; font-size:22px; font-weight:500; color:var(--dim);}
.step button:active{background:rgba(255,255,255,.05); color:var(--txt);}
.step .val{min-width:60px; text-align:center; font-weight:700; font-size:17px; cursor:pointer; font-family:var(--mono);}
.step .val input{width:64px; min-height:40px; padding:4px; text-align:center; font-weight:700; font-size:16px;
  background:var(--bg); border:1px solid var(--accB,var(--lineS)); border-radius:8px; color:var(--txt); font-family:var(--mono);}
.step .unit{display:block; font-size:9px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin-top:-1px; font-family:-apple-system,sans-serif;}
.setrow{display:flex; align-items:center; gap:8px; margin-top:10px;}
.setno{width:20px; text-align:center; color:var(--dim); font-weight:600; font-size:12px; font-family:var(--mono);}
.check{width:52px; height:52px; border-radius:13px; border:1px solid var(--line);
  font-size:18px; color:var(--dim); flex:none;}
.check.on{background:var(--accA); color:var(--acc); border-color:var(--accB);}
input[type=text],input[type=date],input[type=number],select,textarea{
  font:inherit; color:var(--txt); background:rgba(255,255,255,.03); border:1px solid var(--line);
  border-radius:12px; padding:12px; width:100%; min-height:48px;}
input::placeholder{color:var(--dim);}
.seg{display:flex; border:1px solid var(--line); border-radius:13px; padding:3px; margin-bottom:14px;}
.seg button{flex:1; min-height:42px; border-radius:10px; font-weight:600; color:var(--dim); font-size:13px; letter-spacing:.02em;}
.seg button.on{background:rgba(255,255,255,.06); color:var(--txt);}
/* tab bar */
#tabs{position:fixed; left:0; right:0; bottom:0; background:rgba(8,9,11,.88); backdrop-filter:blur(20px);
  border-top:1px solid var(--line); display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom)); z-index:50;}
#tabs button{flex:1; min-height:52px; color:var(--dim); font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
  display:flex; flex-direction:column; align-items:center; gap:4px; border-radius:12px;}
#tabs button.on{color:var(--txt);}
#tabs svg{display:block;}
/* rest timer */
#timer{position:fixed; left:10px; right:10px; bottom:calc(82px + env(safe-area-inset-bottom));
  background:rgba(13,15,18,.97); border:1px solid var(--lineS); border-radius:18px; padding:13px 14px;
  display:none; z-index:60; box-shadow:0 10px 40px rgba(0,0,0,.6);}
#timer.show{display:block;}
#tbar{height:3px; border-radius:2px; background:var(--line); overflow:hidden; margin-top:12px;}
#tfill{height:100%; width:100%; background:var(--pull); transition:width .25s linear;}
.tnum{font-size:28px; font-weight:700; font-family:var(--mono);}
svg{max-width:100%;}
.toast{position:fixed; top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
  background:#14171B; border:1px solid var(--lineS); padding:10px 18px; border-radius:999px;
  font-size:13px; font-weight:600; z-index:99; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;}
.toast.show{opacity:1;}
.badge{font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--mut);}
.hint{font-size:13px; border-radius:10px; padding:8px 11px; margin-top:10px; background:rgba(255,255,255,.03); color:var(--mut); border:1px solid var(--line);}
.hint.up{background:rgba(48,209,88,.08); color:#5ED27F; border-color:rgba(48,209,88,.2);}
.hint.hold{background:rgba(232,197,71,.07); color:#D4B956; border-color:rgba(232,197,71,.2);}
.list-item{display:flex; align-items:center; gap:12px; padding:14px 2px; border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none; padding-bottom:4px;}
.list-item:first-child{padding-top:4px;}
.ghostval{font-size:12px; color:var(--dim); margin-top:4px; font-family:var(--mono);}
.notesin{margin-top:10px; font-size:14px; min-height:44px; padding:10px 12px;}
.small{font-size:13px;}
.warn{background:rgba(255,69,58,.08); color:#FF8A82; border:1px solid rgba(255,69,58,.25); border-radius:12px; padding:10px 12px; font-size:13px; margin-bottom:12px;}
/* Kalender-Heatmap */
.cal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:12px;}
.cal .hd{text-align:center; font-size:10px; color:var(--dim); font-weight:600; letter-spacing:.06em; padding:4px 0;}
.cal .cell{aspect-ratio:1; border-radius:10px; background:rgba(255,255,255,.025); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px; font-size:12px; font-weight:500; color:var(--dim); font-family:var(--mono);}
.cal .cell.has{color:var(--txt); background:rgba(255,255,255,.05);}
.cal .cell.blank{background:transparent;}
.cal .cell.today{border:1px solid var(--lineS);}
.cal .dots{display:flex; gap:2px; height:4px;}
.cal .dots .d{width:4px; height:4px; border-radius:50%;}
/* KPI grid */
.kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px;}
.kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px 8px; text-align:center;}
.kpi b{font-size:20px; display:block; font-family:var(--mono); font-weight:700;}
.kpi span{font-size:10px; color:var(--dim); font-weight:600; letter-spacing:.05em; text-transform:uppercase;}
.delta{font-weight:700; font-size:12px; font-family:var(--mono);}
.delta.up{color:#5ED27F;} .delta.down{color:#FF8A82;} .delta.flat{color:var(--dim);}
/* Murmel / Gamification */
.marble-stage{display:flex; justify-content:center; align-items:center; padding:18px 0 6px;}
.marble-wrap{position:relative; transition:filter .4s;}
.marble-float{animation:mfloat 4s ease-in-out infinite;}
.marble-pulse{animation:mfloat 3s ease-in-out infinite, mpulse 2.4s ease-in-out infinite;}
.marble-beast{animation:mfloat 2.4s ease-in-out infinite, mpulse 1.6s ease-in-out infinite;}
.marble-lazy{filter:saturate(.45) brightness(.8);}
@keyframes mfloat{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
@keyframes mpulse{0%,100%{filter:drop-shadow(0 0 6px var(--glow,rgba(255,255,255,.2)))} 50%{filter:drop-shadow(0 0 18px var(--glow,rgba(255,255,255,.45)))}}
@media (prefers-reduced-motion: reduce){ .marble-float,.marble-pulse,.marble-beast{animation:none;} }
.rank-name{font-size:24px; font-weight:700; letter-spacing:-.01em; text-align:center; margin-top:8px;}
.rank-state{text-align:center; font-size:13px; color:var(--mut); margin-top:2px;}
.pbar{height:6px; border-radius:3px; background:var(--line); overflow:hidden; margin-top:6px;}
.pfill{height:100%; border-radius:3px; transition:width .5s;}
.ladder-item{display:flex; align-items:center; gap:12px; padding:11px 2px; border-bottom:1px solid var(--line);}
.ladder-item:last-child{border-bottom:none;}
.ladder-item.locked{opacity:.4;}
.ladder-item.current{background:rgba(255,255,255,.03); border-radius:10px; padding-left:10px; padding-right:10px;}
.ptbreak{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
.ptbreak div{text-align:center; padding:10px 4px; border:1px solid var(--line); border-radius:12px;}
.ptbreak b{display:block; font-family:var(--mono); font-size:18px; font-weight:700;}
.ptbreak span{font-size:9px; color:var(--dim); font-weight:600; letter-spacing:.04em; text-transform:uppercase;}
/* v1.4 */
#sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:70; display:none;}
#sheet-bg.show{display:block;}
#sheet{position:fixed; left:0; right:0; bottom:0; z-index:71; background:var(--card); border-top:1px solid var(--lineS);
  border-radius:20px 20px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); transform:translateY(110%); transition:transform .25s; max-width:600px; margin:0 auto;}
#sheet.show{transform:translateY(0);}
.qtags{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
.qtag{font-size:12px; font-weight:600; padding:7px 12px; border-radius:999px; border:1px solid var(--line); color:var(--mut); background:transparent;}
.qtag:active{transform:scale(.95); background:rgba(255,255,255,.05);}
.movebtns{display:flex; flex-direction:column; gap:3px; margin-left:6px;}
.movebtns button{width:36px; height:25px; border:1px solid var(--line); border-radius:7px; color:var(--mut); font-size:12px; background:transparent; line-height:1;}
.movebtns button:active{background:rgba(255,255,255,.06);}
.lastblock{margin-top:6px;}
.lastblock summary{list-style:none; cursor:pointer; font-size:12px; color:var(--dim); font-family:var(--mono);}
.lastblock summary::-webkit-details-marker{display:none;}
.lastblock[open] summary{color:var(--mut);}
.lastdetail{margin-top:6px; font-size:12px; color:var(--mut); font-family:var(--mono); line-height:1.7;}
.duebadge{font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--legs); border:1px solid rgba(48,209,88,.4); border-radius:7px; padding:2px 7px; margin-left:6px;}
.notereminder{font-size:12px; color:#D4B956; margin-top:8px; background:rgba(232,197,71,.07); border:1px solid rgba(232,197,71,.2); border-radius:10px; padding:7px 10px;}
.backup{background:rgba(232,197,71,.08); border:1px solid rgba(232,197,71,.25); color:#D4B956; border-radius:12px; padding:10px 12px; font-size:13px; margin-bottom:12px; display:flex; align-items:center; gap:10px;}
.backup button{border:1px solid rgba(232,197,71,.4); color:#D4B956; border-radius:9px; padding:6px 12px; font-weight:600; font-size:13px; background:transparent;}
/* v1.5 */
.report-pts{font-family:var(--mono); font-size:56px; font-weight:800; line-height:1; color:var(--legs); text-align:center;}
.report-pts small{font-size:18px; color:var(--mut); font-weight:600;}
.celebrate{animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(.6); opacity:0} 60%{transform:scale(1.12)} 100%{transform:scale(1); opacity:1}}
.pr-card{display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid rgba(232,197,71,.4); background:rgba(232,197,71,.08); border-radius:12px; margin-bottom:8px; animation:pop .5s ease;}
.confetti{position:fixed; inset:0; pointer-events:none; z-index:80; overflow:hidden;}
.confetti i{position:absolute; width:8px; height:13px; top:-20px; border-radius:2px; animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(112vh) rotate(560deg); opacity:.3}}
.trophy-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
.ach{border:1px solid var(--line); border-radius:12px; padding:11px; display:flex; gap:9px; align-items:center;}
.ach.locked{opacity:.38;}
.ach .ico{font-size:22px; flex:none;}
.ach b{font-size:13px; display:block; line-height:1.2;}
.ach span{font-size:11px; color:var(--mut);}
.quest{border:1px solid rgba(10,132,255,.3); background:rgba(10,132,255,.06); border-radius:14px; padding:14px;}
.quest.done{border-color:rgba(48,209,88,.4); background:rgba(48,209,88,.08);}
.streak-flames{font-size:20px; letter-spacing:1px;}
.skinrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.skinbtn{border:1px solid var(--line); border-radius:11px; padding:8px 12px; font-size:13px; font-weight:600; color:var(--mut); background:transparent;}
.skinbtn.on{border-color:var(--lineS); color:var(--txt); background:rgba(255,255,255,.06);}
.skinbtn.locked{opacity:.4;}
.preview-marbles{display:flex; align-items:center; justify-content:center; gap:22px; margin-top:4px;}
.preview-next{text-align:center; opacity:.5;}
.quote{font-size:14px; color:var(--txt); font-style:italic; text-align:center; padding:4px 8px;}
/* v1.6 */
.rir{flex:none; min-width:52px; height:52px; border-radius:13px; border:1px solid var(--line); background:transparent;
  color:var(--dim); font-size:11px; font-weight:700; font-family:var(--mono); letter-spacing:.02em;}
.rir.set{color:var(--txt); border-color:var(--lineS); background:rgba(255,255,255,.05);}
.musbar{margin-bottom:12px;}
.musbar .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px;}
.musbar .track{position:relative; height:10px; border-radius:5px; background:rgba(255,255,255,.05); overflow:visible;}
.musbar .fill{height:100%; border-radius:5px;}
.musbar .mev,.musbar .mav{position:absolute; top:-3px; width:2px; height:16px; background:var(--mut);}
.musbar .mav{background:var(--nein);}
.musbar .lab{font-size:13px; font-weight:600;}
.musbar .val{font-size:12px; font-family:var(--mono); color:var(--mut);}
.bal-row{display:flex; gap:8px; align-items:center; margin-top:8px;}
.bal-row .seg2{flex:1; height:14px; border-radius:7px; overflow:hidden; display:flex;}
</style>
</head>
<body>
<div id="app"></div>
<div id="timer"><div class="row">
  <div class="grow"><div class="lbl">Pause</div><div class="tnum" id="tleft">90</div></div>
  <button class="btn" onclick="timerAdjust(-15)">−15s</button>
  <button class="btn" onclick="timerAdjust(15)">+15s</button>
  <button class="btn accent t-pull" onclick="timerStop(false)">Weiter</button>
</div><div id="tbar"><div id="tfill"></div></div></div>
<div id="tabs">
  <button data-v="home" onclick="go('home')"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M13 2 5 13h6l-2 9 8-13h-6z"/></svg>Start</button>
  <button data-v="history" onclick="go('history')"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Verlauf</button>
  <button data-v="charts" onclick="go('charts')"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><polyline points="4 17 9 11 13 14 20 6"/><path d="M4 21h16" opacity=".35"/></svg>Charts</button>
  <button data-v="report" onclick="go('report')"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="4" y="5" width="16" height="16" rx="3"/><path d="M4 10h16M9 3v4M15 3v4"/></svg>Report</button>
  <button data-v="marble" onclick="go('marble')"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8"/><path d="M7 9a6 6 0 0 1 7 1" stroke-width="1.3" stroke-linecap="round" opacity=".5"/></svg>Murmel</button>
  <button data-v="settings" onclick="go('settings')"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 8h3M12 8h8M4 16h8M17 16h3"/><circle cx="9.5" cy="8" r="2.2"/><circle cx="14.5" cy="16" r="2.2"/></svg>Mehr</button>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ STORAGE-SHIM: IndexedDB (für eigenständigen Betrieb außerhalb von Claude) ============ */
/* In der Claude-Umgebung existiert window.storage bereits → dann nichts tun.
   Sonst: dauerhafte Speicherung via IndexedDB, mit localStorage als Fallback. */
(function(){
  if (window.storage) return;
  const DBN="ppl-tracker", STORE="kv";
  let dbP=null;
  function db(){
    if (dbP) return dbP;
    dbP = new Promise((res,rej)=>{
      const r = indexedDB.open(DBN,1);
      r.onupgradeneeded = ()=>{ if(!r.result.objectStoreNames.contains(STORE)) r.result.createObjectStore(STORE); };
      r.onsuccess = ()=>res(r.result);
      r.onerror = ()=>rej(r.error);
    });
    return dbP;
  }
  const lsGet = k => { try{ const v=localStorage.getItem("ppl:"+k); return v!==null?{key:k,value:v}:null; }catch(e){ return null; } };
  const lsSet = (k,v) => { try{ localStorage.setItem("ppl:"+k, v); return {key:k,value:v}; }catch(e){ return null; } };
  window.storage = {
    async get(key){
      try{
        const d = await db();
        return await new Promise((res,rej)=>{
          const tx = d.transaction(STORE,"readonly").objectStore(STORE).get(key);
          tx.onsuccess = ()=> res(tx.result!==undefined ? {key, value:tx.result} : null);
          tx.onerror = ()=> rej(tx.error);
        });
      }catch(e){ return lsGet(key); }
    },
    async set(key,value){
      try{
        const d = await db();
        return await new Promise((res,rej)=>{
          const tx = d.transaction(STORE,"readwrite").objectStore(STORE).put(value,key);
          tx.onsuccess = ()=> res({key, value});
          tx.onerror = ()=> rej(tx.error);
        });
      }catch(e){ return lsSet(key,value); }
    },
    async delete(key){
      try{ const d=await db(); return await new Promise((res,rej)=>{ const tx=d.transaction(STORE,"readwrite").objectStore(STORE).delete(key); tx.onsuccess=()=>res({key,deleted:true}); tx.onerror=()=>rej(tx.error); }); }
      catch(e){ try{localStorage.removeItem("ppl:"+key);}catch(_){} return {key,deleted:true}; }
    }
  };
})();

/* ================= SEED DATA (korrigierte Trainingsdaten, einmaliger Import) ================= */
const SEED = {

const KEY = "ppl:v1";
let S = null, view = "home", viewArg = null, memOnly = false, saveT = null;

async function loadState(){
  if (!window.storage){ memOnly = true; S = SEED; return; }
  try {
    const res = await window.storage.get(KEY, false);
    if (res && res.value){ S = JSON.parse(res.value); return; }
  } catch(e){ /* Key existiert noch nicht → Erstimport */ }
  S = SEED;
  await persist(true);
  toast("Trainingsdaten importiert ✓");
}
function save(){ clearTimeout(saveT); saveT = setTimeout(()=>persist(false), 400); }
async function persist(silentFail){
  if (memOnly) return;
  try {
    const r = await window.storage.set(KEY, JSON.stringify(S), false);
    if (!r && !silentFail) toast("Speichern fehlgeschlagen");
  } catch(e){ if(!silentFail) toast("Speichern fehlgeschlagen"); }
}

function isoWeek(iso){
  const d = new Date(iso+"T12:00:00");
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const w1 = new Date(d.getFullYear(),0,4);
  const wk = 1+Math.round(((d-w1)/864e5-3+((w1.getDay()+6)%7))/7);
  return d.getFullYear()+"-W"+String(wk).padStart(2,"0");
}
function weekBounds(iso){
  const d = new Date(iso+"T12:00:00");
  const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = x => x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");
  return { mon:f(mon), sun:f(sun) };
}
const addDays = (iso,n)=>{ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n);

/* ================= CSV-IMPORT KÖRPERDATEN (v1.7) ================= */
function csvNum(v){
  if (v===undefined || v===null) return null;
  const s=String(v).trim();
  if (s===""||s==="--"||s==="-") return null;
  const n=parseFloat(s.replace(",","."));
  return isNaN(n)?null:n;
}
function parseCsvLines(text){
  return text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length).map(l=>l.split(",").map(c=>c.trim()));
}
function detectCsvFormat(text){
  const head=(text.split(/\r?\n/)[0]||"").toLowerCase();
  if (head.includes("weight(kg)") && head.includes("body fat")) return "renpho";
  if (head.includes("recovery") || head.includes("hrv") || head.includes("sleep score")) return "ultrahuman";
  return "unknown";
}
function parseRenphoDate(d){
  const p=d.split("."); if(p.length!==3) return null;
  const [dd,mm,yy]=p; const yyyy = yy.length===4?+yy:2000+ +yy;
  return yyyy+"-"+mm.padStart(2,"0")+"-"+dd.padStart(2,"0");
}
function importRenphoCsv(text){
  const rows=parseCsvLines(text); const data=rows.slice(1); const out=[];
  for (const r of data){
    if (r.length<15) continue;
    const date=parseRenphoDate(r[0]); if(!date) continue;
    out.push({
      date, time:r[1]||"00:00:00",
      weightKg:csvNum(r[2]), bodyFatPct:csvNum(r[4]), skeletalMusclePct:csvNum(r[5]),
      ffmKg:csvNum(r[6]), subcutFatPct:csvNum(r[7]), visceralFat:csvNum(r[8]),
      waterPct:csvNum(r[9]), muscleMassKg:csvNum(r[10]), boneMassKg:csvNum(r[11]),
      proteinPct:csvNum(r[12]), bmr:csvNum(r[13]), metabolicAge:csvNum(r[14]),
      source:"renpho"
    });
  }
  return out;
}
function importUltrahumanCsv(text){
  /* Recovery/Sleep-CSV: nur grobe Auto-Erkennung, Spalten variieren je Export.
     Wir mappen anhand des Headers auf bekannte Felder, alles andere wird ignoriert. */
  const rows=parseCsvLines(text); const header=rows[0].map(h=>h.toLowerCase()); const data=rows.slice(1);
  const idx = name => header.findIndex(h=>h.includes(name));
  const iDate=idx("date"), iRec=idx("recovery"), iSleep=idx("sleep"), iHrv=idx("hrv"), iRhr=idx("rhr")>=0?idx("rhr"):idx("resting heart");
  const out=[];
  for (const r of data){
    if (iDate<0 || !r[iDate]) continue;
    let date=r[iDate];
    if (/^\d{2}\.\d{2}\.\d{2,4}$/.test(date)) date=parseRenphoDate(date);
    else if (/^\d{4}-\d{2}-\d{2}/.test(date)) date=date.slice(0,10);
    else continue;
    out.push({
      date, time:"00:00:00",
      recoveryScore: iRec>=0?csvNum(r[iRec]):null,
      sleepScore: iSleep>=0?csvNum(r[iSleep]):null,
      hrv: iHrv>=0?csvNum(r[iHrv]):null,
      rhr: iRhr>=0?csvNum(r[iRhr]):null,
      source:"ultrahuman"
    });
  }
  return out;
}
function dedupExact(list){
  const seen=new Set(), out=[];
  for (const e of list){
    const k=JSON.stringify(e);
    if (seen.has(k)) continue;
    seen.add(k); out.push(e);
  }
  return out;
}
function pickMorningPerDay(list){
  const byDate={};
  for (const e of list){ (byDate[e.date]=byDate[e.date]||[]).push(e); }
  const out=[];
  for (const d of Object.keys(byDate)){
    const arr=byDate[d].sort((a,b)=> (a.time||"")<(b.time||"")?-1:1);
    out.push(arr[0]);
  }
  return out.sort((a,b)=> a.date<b.date?-1:1);
}
function fatMassKg(e){ return (e.weightKg!=null && e.bodyFatPct!=null) ? +(e.weightKg*e.bodyFatPct/100).toFixed(2) : null; }
function mergeMetrics(newEntries){
  /* Merge per Datum: neue Felder ergänzen vorhandenen Eintrag, ohne Quelle/Zeit der primären (RENPHO) Messung zu verlieren */
  const byDate={};
  for (const e of S.bodyweight.metrics) byDate[e.date]=e;
  for (const e of newEntries){
    const existing = byDate[e.date];
    if (existing){
      const merged = {...existing, ...e};
      /* RENPHO-Quelle/Zeit nicht durch Ultrahuman-Platzhalter überschreiben */
      if (existing.source==="renpho" && e.source==="ultrahuman"){ merged.source=existing.source; merged.time=existing.time; }
      byDate[e.date]=merged;
    } else {
      byDate[e.date]=e;
    }
  }
  S.bodyweight.metrics = Object.values(byDate).sort((a,b)=> a.date<b.date?-1:1);
  /* bodyweight.log synchron halten (für bestehende Gewichts-Charts/Home) */
  for (const e of newEntries){
    if (e.weightKg==null) continue;
    S.bodyweight.log = S.bodyweight.log.filter(x=>x.date!==e.date);
    S.bodyweight.log.push({date:e.date, kg:e.weightKg});
  }
}
function importBodyCsv(text){
  const fmt=detectCsvFormat(text);
  if (fmt==="renpho"){
    const parsed=dedupExact(importRenphoCsv(text));
    const daily=pickMorningPerDay(parsed);
    mergeMetrics(daily);
    return {fmt, raw:parsed.length, days:daily.length, skipped:Math.max(0,parsed.length-daily.length)};
  }
  if (fmt==="ultrahuman"){
    const parsed=dedupExact(importUltrahumanCsv(text));
    const daily=pickMorningPerDay(parsed);
    mergeMetrics(daily);
    return {fmt, raw:parsed.length, days:daily.length, skipped:Math.max(0,parsed.length-daily.length)};
  }
  return {fmt:"unknown", raw:0, days:0, error:"Unsupported CSV format"};
}

const sortedSessions = () => [...S.sessions].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);

function sessionVolume(sess){

  for (const e of sess.entries){

    const mult = ex.perSide ? 2 : 1;

function prFor(exId){
  let best=null;
  for (const sess of S.sessions){
    const e = sess.entries.find(x=>x.exerciseId===exId); if(!e) continue;
    for (const st of e.sets){
      const val = S.exercises[exId].unit==="seconds" ? (st.seconds||0) : (st.kg||0);
      const reps = st.reps||0;
      if (!best || val>best.val || (val===best.val && reps>best.reps))
        best = {val, reps, date:sess.date};
    }
  }
  return best;
}
const e1rm = (kg,reps)=> reps>0 ? kg*(1+reps/30) : kg;
/* ---------- RECOMP-HELPER (v1.7) ---------- */
function linreg(points){
  const n=points.length;
  const sx=points.reduce((a,p)=>a+p.x,0), sy=points.reduce((a,p)=>a+p.y,0);
  const sxy=points.reduce((a,p)=>a+p.x*p.y,0), sxx=points.reduce((a,p)=>a+p.x*p.x,0);
  const denom=n*sxx-sx*sx;
  const slope = denom!==0 ? (n*sxy-sx*sy)/denom : 0;
  const intercept = (sy-slope*sx)/n;
  return {slope, intercept};
}
function recompSeries(){
  return S.bodyweight.metrics
    .filter(m=>m.weightKg!=null && m.bodyFatPct!=null && m.ffmKg!=null)
    .sort((a,b)=>a.date<b.date?-1:1)
    .map(m=>({date:m.date, fatMass:fatMassKg(m), ffm:m.ffmKg, weight:m.weightKg, muscleMass:m.muscleMassKg, bmr:m.bmr, metabolicAge:m.metabolicAge, visceralFat:m.visceralFat, waterPct:m.waterPct}));
}
function recompProjection(){
  const series = recompSeries();
  if (series.length<2) return {status:"insufficient"};
  const t0=new Date(series[0].date+"T12:00:00").getTime();
  const pts = series.map(e=>({x:(new Date(e.date+"T12:00:00").getTime()-t0)/864e5, y:e.fatMass}));
  const {slope, intercept} = linreg(pts);
  const avgFfm = series.reduce((a,e)=>a+e.ffm,0)/series.length;
  const targetFatMass = S.bodyweight.goalKg - avgFfm;
  const last = series[series.length-1];
  if (targetFatMass<=0) return {status:"target_unreasonable", avgFfm, targetFatMass};
  if (slope>=-0.001) return {status:"no_trend", slope, avgFfm, targetFatMass, last};
  if (last.fatMass<=targetFatMass) return {status:"reached", avgFfm, targetFatMass, last};
  const lastX = pts[pts.length-1].x;
  const targetX = (targetFatMass-intercept)/slope;
  const daysFromLast = targetX-lastX;
  const eta = addDays(last.date, Math.round(daysFromLast));
  return {status:"projected", slope, avgFfm, targetFatMass, last, eta, weeklyRate:slope*7};
}
/* Kraft pro Muskelmasse: Summe der besten e1RM aktueller Übungen (letzte Session je Übung) / aktuelle Muskelmasse */
function strengthPerMuscleMass(){
  const series = recompSeries();
  if (!series.length) return null;
  const latestMM = series[series.length-1].muscleMass;
  if (!latestMM) return null;
  let totalE1rm=0;
  for (const id of Object.keys(S.exercises)){
    if (S.exercises[id].unit==="seconds") continue;
    const last = lastEntryFor(id); if(!last) continue;
    let best=0;
    for (const st of last.entry.sets) best=Math.max(best, e1rm(st.kg||0, st.reps||0));
    totalE1rm += best;
  }
  return {totalE1rm:Math.round(totalE1rm), muscleMass:latestMM, ratio: +(totalE1rm/latestMM).toFixed(2)};
}

function suggest(exId){
  const ex = S.exercises[exId];
  const last = lastEntryFor(exId);
  if (ex.unit==="seconds"){
    if (!last) return { sets:[{seconds:30},{seconds:30},{seconds:30}], hint:"Erste Session – Startwert wählen", cls:"" };
    const base = Math.max(...last.entry.sets.map(s=>s.seconds||0));
    const allHit = last.entry.sets.every(s=>(s.seconds||0)>=base);
    const sec = allHit ? base+ex.increment : base;
    return { sets:last.entry.sets.map(()=>({seconds:sec})),
      hint: allHit ? "Steigerung: +"+ex.increment+"s" : "Gleiches Niveau halten", cls: allHit?"up":"" };
  }
  if (!last) return { sets:[{kg:0,reps:ex.repMin},{kg:0,reps:ex.repMin},{kg:0,reps:ex.repMin}], hint:"Erste Session – Gewicht wählen", cls:"" };
  const sets = last.entry.sets;
  const baseKg = sets[sets.length-1].kg;
  const allMax = sets.every(s=>(s.reps||0) >= ex.repMax);
  const anyBelowMin = sets.some(s=>(s.reps||0) < ex.repMin);
  /* RIR-Autoregulation (#14): wie viele Reps blieben beim letzten Mal im Tank? */
  const rirs = sets.map(s=>s.rir).filter(v=>v!==undefined && v!==null);
  const avgRir = rirs.length ? rirs.reduce((a,b)=>a+b,0)/rirs.length : null;
  /* Plateau (#13) */
  const pl = plateauInfo(exId);
  let kg = baseKg, hint, cls="";
  if (pl.deload){ kg = +(baseKg*0.9).toFixed(2); hint = "Deload empfohlen – "+pl.sessions+"× kein Fortschritt. ~10 % runter, sauber ausführen."; cls="hold"; }
  else if (allMax && (avgRir===null || avgRir>=1)){ kg = +(baseKg + ex.increment).toFixed(2); hint = "Steigerung: +"+fmt(ex.increment)+" kg – alle Sätze bei "+ex.repMax+"+ Reps"+(avgRir!==null?" (RIR ~"+avgRir.toFixed(0)+")":""); cls="up"; }
  else if (allMax && avgRir===0){ kg = baseKg; hint = "Reps erreicht, aber bis zum Versagen – Gewicht halten, RIR ~1-2 anpeilen"; cls="hold"; }
  else if (anyBelowMin){ hint = "Gleiches Gewicht – Form fokussieren (Ziel: "+ex.repMin+"–"+ex.repMax+")"; cls="hold"; }
  else { hint = "Gleiches Gewicht, Reps Richtung "+ex.repMax+" steigern"; }
  /* e1RM-Kontext (#16) */
  const e1 = Math.max(...sets.map(s=>e1rm(s.kg||0,s.reps||0)));
  return { sets: sets.map(()=>({kg, reps: ex.repMin})), hint, cls, e1:+e1.toFixed(1) };
}
/* ---------- v1.6: COACH-LOGIK ---------- */
const MUSCLES = {
  chest:      {name:"Brust",      mev:10, mav:22},
  back:       {name:"Rücken",     mev:10, mav:22},
  shoulders:  {name:"Schultern",  mev:8,  mav:22},
  biceps:     {name:"Bizeps",     mev:8,  mav:20},
  triceps:    {name:"Trizeps",    mev:8,  mav:18},
  quads:      {name:"Quadrizeps", mev:8,  mav:20},
  hamstrings: {name:"Beinbeuger", mev:6,  mav:16},
  core:       {name:"Core",       mev:0,  mav:16},
  other:      {name:"Sonstige",   mev:0,  mav:99},
};
const SUB_FALLBACK = {
  chest:["Liegestütze","Brustpresse Maschine","Kurzhantel-Fly"],
  back:["Klimmzüge","Langhantelrudern","Einarmiges KH-Rudern"],
  shoulders:["Arnold Press","Frontheben","Reverse Fly"],
  biceps:["Langhantel-Curl","Konzentrationscurl","Schrägbank-Curl"],
  triceps:["Dips","Overhead-Extension","Enge Liegestütze"],
  quads:["Kniebeuge","Ausfallschritte","Hackenschmidt"],
  hamstrings:["Stiff-Leg-Deadlift","Good Morning","Nordic Curl"],
  core:["Hanging Leg Raise","Ab Wheel","Cable Crunch"],
  other:["—"],
};
/* e1RM-Verlauf einer Übung über abgeschlossene Sessions (älteste→neueste) */
function e1Series(exId){
  const ex=S.exercises[exId]; const out=[];
  for (const s of [...S.sessions].filter(x=>x.date<=todayStr()).sort((a,b)=>a.date<b.date?-1:1)){
    const e=s.entries.find(x=>x.exerciseId===exId); if(!e||!e.sets.length) continue;
    out.push(ex.unit==="seconds" ? Math.max(...e.sets.map(x=>x.seconds||0)) : +Math.max(...e.sets.map(x=>e1rm(x.kg||0,x.reps||0))).toFixed(1));
  }
  return out;
}
/* Plateau: letzte N Sessions ohne neuen Höchstwert */
function plateauInfo(exId){
  const ser=e1Series(exId);
  if (ser.length<3) return {plateau:false, deload:false, sessions:0};
  const peak=Math.max(...ser);
  let since=0;
  for (let i=ser.length-1;i>=0;i--){ if (ser[i]>=peak-1e-6) break; since++; }
  /* kein neuer Peak seit >=2 Sessions = Plateau; >=3 = Deload */
  return { plateau:since>=2, deload:since>=3, sessions:since, peak };
}
/* Harte Sätze pro Muskel in einer ISO-Woche */
function setsByMuscleForWeek(wk){
  const acc={};
  for (const s of S.sessions){ if(s.date>todayStr()||isoWeek(s.date)!==wk) continue;
    for (const e of s.entries){ const ex=S.exercises[e.exerciseId]; if(!ex) continue;
      const mu=ex.muscle||"other"; acc[mu]=(acc[mu]||0)+e.sets.length; } }
  return acc;
}
/* Push/Pull/Legs-Balance über die letzten 3 Wochen (harte Sätze) */
function balanceInfo(){
  const acc={push:0,pull:0,legs:0}; let d=todayStr();
  const weeks=new Set(); for(let i=0;i<3;i++){ weeks.add(isoWeek(d)); d=addDays(d,-7); }
  for (const s of S.sessions){ if(s.date>todayStr()||!weeks.has(isoWeek(s.date))) continue;
    let n=0; for(const e of s.entries) n+=e.sets.length; acc[s.type]+=n; }
  return acc;
}
function substitutesFor(exId){
  const ex=S.exercises[exId]; const mu=ex.muscle||"other";
  const own=Object.keys(S.exercises).filter(id=>id!==exId && (S.exercises[id].muscle||"other")===mu).map(id=>S.exercises[id].name);
  const extra=(SUB_FALLBACK[mu]||[]).filter(n=>!own.includes(n));
  return [...own, ...extra].slice(0,6);
}
function lastTxtFor(exId){
  const ex=S.exercises[exId], last=lastEntryFor(exId);
  if (!last) return null;
  if (ex.unit==="seconds") return "Zuletzt ("+dShort(last.date)+"): "+last.entry.sets.map(s=>(s.seconds||0)+"s").join(" · ");
  return "Zuletzt ("+dShort(last.date)+"): "+last.entry.sets.map(s=>fmt(s.kg||0)+"×"+(s.reps||0)).join(" · ");
}
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ================= REST TIMER (Zeitstempel-basiert, hintergrund-sicher) ================= */
let tEnd=0, tTotal=90, tInt=null;
let audioCtx=null;
function ensureAudio(){
  try{
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==="suspended") audioCtx.resume();
  }catch(e){}
}
function timerStart(exId){
  const ex = exId ? S.exercises[exId] : null;
  tTotal = (ex && ex.restSeconds) ? ex.restSeconds : S.settings.restSeconds;
  tEnd = Date.now() + tTotal*1000;
  $("timer").classList.add("show"); tick();
  clearInterval(tInt); tInt = setInterval(tick, 250);
}
function tick(){
  const left = Math.max(0, Math.ceil((tEnd - Date.now())/1000));
  $("tleft").textContent = left+"s";
  $("tfill").style.width = Math.max(0,(left/tTotal)*100)+"%";
  if (left<=0) timerStop(true);
}
function timerAdjust(d){ tEnd = Math.max(Date.now(), tEnd + d*1000); tTotal = Math.max(tTotal, Math.ceil((tEnd-Date.now())/1000)); tick(); }
function timerStop(finished){
  clearInterval(tInt); $("timer").classList.remove("show");
  if (finished){
    if (S.settings.vibration && navigator.vibrate) navigator.vibrate([200,100,200]);
    if (S.settings.sound) beep();
    toast("Pause vorbei – nächster Satz");
  }
}
function beep(){
  try{
    ensureAudio(); if(!audioCtx) return;
    [0,.2].forEach(t=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.frequency.value=880; o.type="sine"; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(.4, audioCtx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+t+.15);
      o.start(audioCtx.currentTime+t); o.stop(audioCtx.currentTime+t+.16);
    });
  }catch(e){}
}
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden && tEnd>0 && $("timer").classList.contains("show")) tick(); });

  const ownIds=Object.keys(S.exercises).filter(id=>id!==e.exerciseId && (S.exercises[id].muscle||"other")===(S.exercises[e.exerciseId].muscle||"other"));
  const rows=subs.map(name=>{
    const exist=Object.keys(S.exercises).find(id=>S.exercises[id].name===name);
    return `<button class="btn full" style="margin-top:8px; justify-content:flex-start" onclick="swapExercise(${ei}, ${exist?`'${exist}'`:`null`}, '${esc(name).replace(/'/g,"")}')">${esc(name)}${exist?"":' <span class="mut" style="margin-left:6px">neu</span>'}</button>`;
  }).join("");
  document.body.insertAdjacentHTML("beforeend",
    `<div id="sheet-bg" onclick="closeAddSheet()"></div>
     <div id="sheet">
       <b>Ersatz für ${esc(S.exercises[e.exerciseId].name)}</b>
       <div class="mut small" style="margin-top:4px">Gleiche Muskelgruppe – tauscht die Übung in dieser Session.</div>
       ${rows||'<div class="mut" style="margin-top:10px">Keine Alternativen gefunden.</div>'}
       <button class="btn full ghost" style="margin-top:12px" onclick="closeAddSheet()">Abbrechen</button>
     </div>`);
  requestAnimationFrame(()=>{ $("sheet-bg").classList.add("show"); $("sheet").classList.add("show"); });
}
function swapExercise(ei, exId, name){
  const e=S.draft.entries[ei];
  let id=exId;
  if(!id){ id="ex"+Date.now(); const mu=S.exercises[e.exerciseId].muscle||"other";
    S.exercises[id]={name, perSide:false, unit:"kg", repMin:8, repMax:12, increment:2.5, muscle:mu}; }
  const sg=suggest(id);
  S.draft.entries[ei]={ exerciseId:id, sets:sg.sets.map(s=>({...s,done:false})), notes:"", hint:sg.hint, hintCls:sg.cls };
  closeAddSheet(); save(); render();
}
function stepper(ei,si,field,val,unit){
  const id=`v${ei}-${si}-${field}`;
  return `<div class="step grow">
    <button onclick="chg(${ei},${si},'${field}',-1)">−</button>
    <div class="val grow" id="${id}" onclick="editDraftVal(${ei},${si},'${field}')">${fmt(val||0)}<span class="unit">${unit}</span></div>
    <button onclick="chg(${ei},${si},'${field}',1)">+</button></div>`;
}
function unitOf(field){ return field==="reps"?"Reps":field==="seconds"?"s":"kg"; }
function chg(ei,si,field,dir){
  const e=S.draft.entries[ei], ex=S.exercises[e.exerciseId], st=e.sets[si];
  const step = field==="reps" ? 1 : ex.increment;
  st[field] = Math.max(0, +(((st[field]||0)+dir*step)).toFixed(2));
  $(`v${ei}-${si}-${field}`).innerHTML = fmt(st[field])+`<span class="unit">${unitOf(field)}</span>`;
  save();
}
function inlineEdit(elId, cur, cb){
  const el=$(elId); if(!el || el.querySelector("input")) return;
  el.innerHTML = `<input type="number" inputmode="decimal" step="any" value="${cur}">`;
  const inp=el.querySelector("input");
  inp.focus(); inp.select();
  const commit=()=>{ const v=parseFloat(String(inp.value).replace(",", "."));
    cb(isNaN(v)?cur:Math.max(0,+v.toFixed(2))); };
  inp.onblur=commit;
  inp.onkeydown=e=>{ if(e.key==="Enter") inp.blur(); };
}
function editDraftVal(ei,si,field){
  const st=S.draft.entries[ei].sets[si];
  inlineEdit(`v${ei}-${si}-${field}`, st[field]||0, v=>{
    st[field]=field==="reps"?Math.round(v):v; save();
    $(`v${ei}-${si}-${field}`).innerHTML = fmt(st[field])+`<span class="unit">${unitOf(field)}</span>`;
  });
}
function toggleDone(ei,si){
  ensureAudio(); /* Nutzergeste → Audio für Timer-Ende freischalten (iOS) */
  const e=S.draft.entries[ei], st=e.sets[si];
  st.done=!st.done; save(); render();
  if (st.done){
    if (S.settings.vibration && navigator.vibrate) navigator.vibrate(12); /* Haptik (#4) */
    timerStart(e.exerciseId);
  }
}
function addSet(ei){
  const sets=S.draft.entries[ei].sets;
  sets.push({...sets[sets.length-1], done:false}); save(); render();
}
function removeEntry(ei){ S.draft.entries.splice(ei,1); save(); render(); }
function openAddSheet(){
  if ($("sheet-bg")) return;
  const opts = Object.keys(S.exercises).filter(id=>!S.draft.entries.some(e=>e.exerciseId===id))
    .map(id=>`<option value="${id}">${esc(S.exercises[id].name)}</option>`).join("");
  document.body.insertAdjacentHTML("beforeend",
    `<div id="sheet-bg" onclick="closeAddSheet()"></div>
     <div id="sheet">
       <b>Übung hinzufügen</b>
       <select id="addexSel" style="margin-top:12px" onchange="$('addexNameWrap').style.display=this.value==='__new'?'block':'none'">
         ${opts}<option value="__new">+ Neue Übung anlegen…</option></select>
       <div id="addexNameWrap" style="display:none; margin-top:10px">
         <input type="text" id="addexName" placeholder="Name der neuen Übung"></div>
       <div class="row" style="margin-top:14px">
         <button class="btn grow" onclick="closeAddSheet()">Abbrechen</button>
         <button class="btn grow accent t-pull" onclick="addExerciseConfirm()">Hinzufügen</button></div>
     </div>`);
  requestAnimationFrame(()=>{ $("sheet-bg").classList.add("show"); $("sheet").classList.add("show"); });
}
function closeAddSheet(){
  const bg=$("sheet-bg"), sh=$("sheet"); if(!bg) return;
  bg.classList.remove("show"); sh.classList.remove("show");
  setTimeout(()=>{ bg.remove(); sh.remove(); }, 250);
}
function addExerciseConfirm(){
  let id = $("addexSel").value;
  if (id==="__new"){
    const name = ($("addexName").value||"").trim();
    if (!name){ toast("Bitte Namen eingeben"); return; }
    id = "ex"+Date.now();
    S.exercises[id] = { name, perSide:false, unit:"kg", repMin:8, repMax:12, increment:2.5 };
  }
  const sg = suggest(id);
  S.draft.entries.push({ exerciseId:id, sets:sg.sets.map(s=>({...s,done:false})), notes:"", hint:sg.hint, hintCls:sg.cls });
  closeAddSheet(); save(); render();
}
function cancelDraft(){
  if (!_cancelArm){ _cancelArm=true; toast("Session verwerfen? Nochmal tippen");
    setTimeout(()=>_cancelArm=false, 3000); return; }
  _cancelArm=false;
  S.draft=null; save(); timerStop(false); releaseWake(); stopSessTimer(); go("home");
}
function finishSession(){
  const d=S.draft;
  const undone = d.entries.reduce((n,e)=>n+e.sets.filter(s=>!s.done).length,0);
  const doneCnt = d.entries.reduce((n,e)=>n+e.sets.filter(s=>s.done).length,0);
  if (undone>0 && doneCnt>0){ finishAsk=true; render(); window.scrollTo(0,document.body.scrollHeight); return; }
  doFinish(doneCnt>0 ? "done" : "all");
}
function doFinish(mode){
  const d=S.draft;
  const entries = d.entries.map(e=>({
      exerciseId:e.exerciseId, notes:e.notes,
      sets: (mode==="done" ? e.sets.filter(s=>s.done) : e.sets).map(({done,...rest})=>rest)
    })).filter(e=>e.sets.length);
  if (!entries.length){ toast("Keine Sätze erfasst"); finishAsk=false; render(); return; }
  const durMin = d.startedAt ? Math.max(1, Math.round((Date.now()-d.startedAt)/60000)) : null;
  const newId = "s"+Date.now();
  S.sessions.push({ id:newId, type:d.type, date:d.date, entries, durationMin:durMin });
  S.draft=null; finishAsk=false; save(); timerStop(false); releaseWake(); stopSessTimer();
  const hl=sessionHighlights(newId);
  go("sessionReport", newId);
  if (hl.prs.length){ if(navigator.vibrate&&S.settings.vibration) navigator.vibrate([120,60,120]); setTimeout(spawnConfetti, 250); }
}

/* ---------- HISTORY ---------- */
function vHistory(){
  const items = sortedSessions().map(s=>{
    const T=TYPES[s.type];
    return `<div class="list-item" onclick="go('sessionDetail','${s.id}')">
      <div class="dot" style="background:${T.color}; width:9px; height:9px;"></div>
      <div class="grow"><b>${T.label}</b> <span class="mut num">· ${dLong(s.date)}</span>
        <div class="mut num">${s.entries.length} Übungen · ${fmt(sessionVolume(s))} kg${s.durationMin?" · "+s.durationMin+" min":""}</div></div>
      <div class="mut">›</div></div>`;
  }).join("");
  return `<h1>Verlauf</h1><p class="sub">${S.sessions.length} Sessions gesamt</p>
    <div class="card">${items || '<div class="mut">Noch keine Sessions.</div>'}</div>`;
}
function vDetail(){
  const s = S.sessions.find(x=>x.id===viewArg); if(!s) return vHistory();
  const si = S.sessions.indexOf(s);
  const T = TYPES[s.type];
  const cards = s.entries.map((e,ei)=>{
    const ex=S.exercises[e.exerciseId]; const sec=ex.unit==="seconds";
    const pr = prFor(e.exerciseId);
    const rows = e.sets.map((st,xi)=>{
      const isPr = pr && !sec && st.kg===pr.val && st.reps===pr.reps && s.date===pr.date;

      return `<div class="setrow">
        <div class="setno">${xi+1}</div>

      ${ex.perSide?'<span class="badge">pro Seite</span>':""}

  return `<div class="row"><h1 class="grow" style="color:${T.color}">${T.label}</h1>
    <button class="btn ghost" onclick="go('history')">‹ Zurück</button></div>
  <div class="row" style="margin:6px 0 14px">
    <input type="date" value="${s.date}" onchange="S.sessions[${si}].date=this.value; save();" style="max-width:180px">
  </div>${cards}
  <button class="btn full danger" onclick="delSession('${s.id}', this)">Session löschen</button>`;
}
function dstep(si,ei,xi,field,val,unit){
  const id=`d${si}-${ei}-${xi}-${field}`;
  return `<div class="step grow">
    <button onclick="dchg(${si},${ei},${xi},'${field}',-1)">−</button>
    <div class="val grow" id="${id}" onclick="editDetailVal(${si},${ei},${xi},'${field}')">${fmt(val||0)}<span class="unit">${unit}</span></div>
    <button onclick="dchg(${si},${ei},${xi},'${field}',1)">+</button></div>`;
}
function dchg(si,ei,xi,field,dir){
  const s=S.sessions[si], e=s.entries[ei], ex=S.exercises[e.exerciseId], st=e.sets[xi];
  const step = field==="reps"?1:ex.increment;
  st[field]=Math.max(0,+(((st[field]||0)+dir*step)).toFixed(2));
  $(`d${si}-${ei}-${xi}-${field}`).innerHTML=fmt(st[field])+`<span class="unit">${unitOf(field)}</span>`;
  save();
}
function editDetailVal(si,ei,xi,field){
  const st=S.sessions[si].entries[ei].sets[xi];
  inlineEdit(`d${si}-${ei}-${xi}-${field}`, st[field]||0, v=>{
    st[field]=field==="reps"?Math.round(v):v; save();
    $(`d${si}-${ei}-${xi}-${field}`).innerHTML = fmt(st[field])+`<span class="unit">${unitOf(field)}</span>`;
  });
}
function delSession(id, btn){
  if (btn.dataset.arm){ S.sessions=S.sessions.filter(s=>s.id!==id); save(); toast("Gelöscht"); go("history"); return; }
  btn.dataset.arm="1"; btn.textContent="Wirklich löschen? Nochmal tippen";
  setTimeout(()=>{ if(btn.isConnected){ delete btn.dataset.arm; btn.textContent="Session löschen"; }}, 3000);
}

/* ---------- CHARTS ---------- */
let chartTab="ex", chartEx=null, showE1rm=true;
function vCharts(){
  chartEx = chartEx || "flachbank";
  const seg = `<div class="seg">
    <button class="${chartTab==="ex"?"on":""}" onclick="chartTab='ex';render()">Übungen</button>
    <button class="${chartTab==="vol"?"on":""}" onclick="chartTab='vol';render()">Volumen</button>
    <button class="${chartTab==="mus"?"on":""}" onclick="chartTab='mus';render()">Muskeln</button>
    <button class="${chartTab==="bw"?"on":""}" onclick="chartTab='bw';render()">Körper</button></div>`;
  let body="";
  if (chartTab==="ex"){
    const opts = Object.keys(S.exercises).map(id=>`<option value="${id}" ${id===chartEx?"selected":""}>${esc(S.exercises[id].name)}</option>`).join("");
    const ex=S.exercises[chartEx]; const sec=ex.unit==="seconds";
    const pts=[], e1pts=[];
    for (const s of [...S.sessions].sort((a,b)=>a.date<b.date?-1:1)){
      const e=s.entries.find(x=>x.exerciseId===chartEx); if(!e || !e.sets.length) continue;
      if (sec){ pts.push({date:s.date, v:Math.max(...e.sets.map(x=>x.seconds||0))}); continue; }
      let bestKg=0, bestE1=0;
      for (const st of e.sets){
        if ((st.kg||0)>bestKg) bestKg=st.kg||0;
        const e1=e1rm(st.kg||0, st.reps||0); if (e1>bestE1) bestE1=e1;
      }
      pts.push({date:s.date, v:bestKg});
      e1pts.push({date:s.date, v:+bestE1.toFixed(1)});
    }
    const pr = prFor(chartEx);
    const series = [{pts, color:"var(--pull)", dash:null, showLabels:true, area:true}];
    if (!sec && showE1rm) series.push({pts:e1pts, color:"var(--gold)", dash:"5 5", showLabels:false});
    body = `<div class="card"><select onchange="chartEx=this.value;render()">${opts}</select>
      ${pr?`<div class="hint up" style="margin-top:10px"><span class="pr">PR</span>&nbsp; ${fmt(pr.val)}${sec?"s":" kg"}${sec?"":" × "+pr.reps+" Reps"} am ${dLong(pr.date)}</div>`:""}
      <div style="margin-top:14px">${lineChart(series, sec?"s":"kg", pr?pr.val:null, null)}</div>
      ${sec?"":`<div class="row" style="margin-top:10px; justify-content:space-between">
        <span class="chip"><span class="dot" style="background:var(--pull)"></span>Bestes Gewicht</span>
        <button class="btn ghost small" onclick="showE1rm=!showE1rm;render()">
          <span class="dot" style="background:var(--gold)"></span>&nbsp;e1RM ${showE1rm?"ausblenden":"einblenden"}</button></div>
      <p class="mut small" style="margin:8px 0 0">e1RM = geschätztes 1-Wiederholungs-Maximum (Epley: kg × (1 + Reps/30)). Steigt es bei gleichem Gewicht, wirst du stärker, auch ohne Gewichtserhöhung.</p>`}
      </div>`;
  }
  if (chartTab==="vol"){
    const weeks={};
    for (const s of S.sessions){
      const w=isoWeek(s.date); weeks[w]=weeks[w]||{push:0,pull:0,legs:0};
      weeks[w][s.type]+=sessionVolume(s);
    }
    const keys=Object.keys(weeks).sort().slice(-6);
    body = `<div class="card"><div class="lbl">Wochenvolumen (kg) pro Muskelgruppe</div>
      <div style="margin-top:14px">${barChart(keys, weeks)}</div>
      <div class="row" style="margin-top:12px; justify-content:center; gap:12px">
        ${Object.keys(TYPES).map(t=>`<span class="chip"><span class="dot" style="background:${TYPES[t].color}"></span>${TYPES[t].label}</span>`).join("")}
      </div></div>`;
  }
  if (chartTab==="mus"){
    const wk=isoWeek(todayStr());
    const sm=setsByMuscleForWeek(wk);
    const order=["chest","back","shoulders","biceps","triceps","quads","hamstrings","core"];
    const bars=order.filter(mu=>MUSCLES[mu]).map(mu=>{
      const M=MUSCLES[mu]; const sets=sm[mu]||0;
      const scale=Math.max(M.mav*1.15, sets, 1);
      const pct=v=>Math.min(100,v/scale*100);
      const status = sets<M.mev ? {t:"unter MEV", c:"var(--mut)"} : sets>M.mav ? {t:"über MAV", c:"var(--nein)"} : {t:"im Zielbereich", c:"var(--legs)"};
      return `<div class="musbar">
        <div class="top"><span class="lab">${M.name}</span><span class="val">${sets} Sätze · <span style="color:${status.c}">${status.t}</span></span></div>
        <div class="track">
          <div class="fill" style="width:${pct(sets)}%; background:${status.c}"></div>
          ${M.mev?`<div class="mev" style="left:${pct(M.mev)}%"></div>`:""}
          <div class="mav" style="left:${pct(M.mav)}%"></div>
        </div></div>`;
    }).join("");
    /* Balance */
    const bal=balanceInfo(); const tot=bal.push+bal.pull+bal.legs||1;
    const balBar=`<div class="bal-row"><div class="seg2">
        <div style="width:${bal.push/tot*100}%; background:var(--push)"></div>
        <div style="width:${bal.pull/tot*100}%; background:var(--pull)"></div>
        <div style="width:${bal.legs/tot*100}%; background:var(--legs)"></div>
      </div></div>`;
    const imbalance = (()=>{ const p=bal.push,l=bal.pull; if(p+l<6) return "";
      const ratio=p/(l||1);
      if(ratio>1.5) return `<div class="hint hold" style="margin-top:10px">Push überwiegt Pull deutlich (${bal.push} vs. ${bal.pull} Sätze/3 Wo.) – mehr Rücken einplanen.</div>`;
      if(ratio<0.66) return `<div class="hint hold" style="margin-top:10px">Pull überwiegt Push (${bal.pull} vs. ${bal.push} Sätze/3 Wo.) – mehr Druck einplanen.</div>`;
      return `<div class="hint up" style="margin-top:10px">Push/Pull gut ausbalanciert (${bal.push} vs. ${bal.pull} Sätze).</div>`; })();
    /* Plateaus */
    const plat=Object.keys(S.exercises).filter(id=>S.exercises[id].unit!=="seconds").map(id=>({id,...plateauInfo(id)})).filter(p=>p.plateau);
    const platHtml = plat.length ? plat.map(p=>`<div class="list-item"><div class="grow"><b>${esc(S.exercises[p.id].name)}</b>
        <div class="mut">${p.deload?"Deload empfohlen":"Stagnation"} · ${p.sessions} Sessions</div></div>
        <span class="delta ${p.deload?"down":"flat"}">${p.deload?"Deload":"⚠"}</span></div>`).join("")
      : '<div class="mut">Keine Plateaus erkannt – alles im Fluss. 💧</div>';
    body = `<div class="card"><div class="lbl">Harte Sätze diese Woche · Ziel zwischen MEV und MAV</div>
      <div style="margin-top:14px">${bars}</div>
      <p class="mut small">Markierungen: MEV (Minimum für Wachstum) bis MAV (sinnvolles Maximum). Pro Satz = 1 harter Satz.</p></div>
    <div class="card"><div class="lbl">Push / Pull / Legs · letzte 3 Wochen (Sätze)</div>
      ${balBar}
      <div class="row" style="margin-top:10px; justify-content:center; gap:12px">
        <span class="chip"><span class="dot" style="background:var(--push)"></span>Push ${bal.push}</span>
        <span class="chip"><span class="dot" style="background:var(--pull)"></span>Pull ${bal.pull}</span>
        <span class="chip"><span class="dot" style="background:var(--legs)"></span>Legs ${bal.legs}</span>
      </div>${imbalance}</div>
    <h2>Plateau-Check</h2><div class="card">${platHtml}</div>`;
  }
  if (chartTab==="bw"){
    const log=[...S.bodyweight.log].sort((a,b)=>a.date<b.date?-1:1).map(e=>({date:e.date, v:e.kg}));
    const recomp = recompSeries();
    let recompHtml="";
    if (recomp.length>=2){
      const fatSeries = recomp.map(e=>({date:e.date, v:e.fatMass}));
      const ffmSeries = recomp.map(e=>({date:e.date, v:e.ffm}));
      const proj = recompProjection();
      let projHtml="";
      if (proj.status==="projected"){
        projHtml = `<div class="hint up" style="margin-top:10px">Fettmasse-Trend ${fmt(proj.weeklyRate)} kg/Woche → Ziel ${fmt(S.bodyweight.goalKg)} kg (≈ ${fmt(proj.targetFatMass)} kg Fettmasse bei konstanter FFM) erreicht ≈ <b class="num">${dLong(proj.eta)}</b></div>`;
      } else if (proj.status==="reached"){
        projHtml = `<div class="hint up" style="margin-top:10px">Fettmasse bereits auf/unter Zielniveau (${fmt(proj.targetFatMass)} kg).</div>`;
      } else if (proj.status==="no_trend"){
        projHtml = `<div class="hint" style="margin-top:10px">Noch kein fallender Fettmasse-Trend erkennbar (${fmt(proj.slope*7)} kg/Woche) – mehr Messungen helfen für eine Prognose.</div>`;
      } else if (proj.status==="target_unreasonable"){
        projHtml = `<div class="hint hold" style="margin-top:10px">Ziel ${fmt(S.bodyweight.goalKg)} kg liegt unter deiner aktuellen fettfreien Masse (${fmt(proj.avgFfm)} kg) – Ziel oder Datenbasis prüfen.</div>`;
      } else {
        projHtml = `<div class="hint" style="margin-top:10px">Für eine Prognose mind. 2 Tage mit Körperdaten importieren.</div>`;
      }
      const last = recomp[recomp.length-1];
      recompHtml = `<div class="card"><div class="lbl">Recomp · Fettmasse vs. fettfreie Masse</div>
        <div style="margin-top:14px">${dualAxisChart(fatSeries, ffmSeries, "Fettmasse (kg)", "Fettfreie Masse (kg)", "var(--push)", "var(--pull)")}</div>
        ${projHtml}</div>
      <div class="kpis">
        <div class="kpi"><b class="num">${fmt(last.fatMass)}</b><span>Fettmasse kg</span></div>
        <div class="kpi"><b class="num">${fmt(last.ffm)}</b><span>FFM kg</span></div>
        <div class="kpi"><b class="num">${fmt(last.muscleMass)}</b><span>Muskelmasse kg</span></div>
      </div>
      <div class="kpis">
        <div class="kpi"><b class="num">${last.visceralFat!=null?fmt(last.visceralFat):"–"}</b><span>Viszeralfett</span></div>
        <div class="kpi"><b class="num">${last.waterPct!=null?fmt(last.waterPct)+"%":"–"}</b><span>Wasser</span></div>
        <div class="kpi"><b class="num">${last.bmr!=null?fmt(last.bmr):"–"}</b><span>BMR kcal</span></div>
      </div>`;
      const spm = strengthPerMuscleMass();
      if (spm){
        recompHtml += `<div class="card"><div class="lbl">Kraft pro Muskelmasse</div>
          <div class="row" style="margin-top:10px"><div class="grow">
            <b class="num" style="font-size:22px">${spm.ratio}</b> <span class="mut">e1RM-Summe ÷ Muskelmasse</span>
            <div class="mut num" style="margin-top:4px">${fmt(spm.totalE1rm)} kg e1RM (alle Übungen) ÷ ${fmt(spm.muscleMass)} kg Muskelmasse</div>
          </div></div>

function delBw(date){

let gradN=0;
function lineChart(series, unit, prVal, goal){
  const main = series[0];
  if (!main || !main.pts.length) return '<div class="mut">Noch keine Daten.</div>';
  const W=520,H=240,P=40;
  let vals=series.flatMap(s=>s.pts.map(p=>p.v)); if(goal!=null) vals=vals.concat(goal);
  let min=Math.min(...vals), max=Math.max(...vals);
  if (min===max){ min-=2; max+=2; } const pad=(max-min)*.15; min-=pad; max+=pad;
  const n = main.pts.length;
  const X=i=> n===1 ? W/2 : P+(i/(n-1))*(W-2*P);
  const Y=v=> H-P-((v-min)/(max-min))*(H-2*P);
  let out="", defs="";
  for (const s of series){
    const path = s.pts.map((p,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(p.v).toFixed(1)).join(" ");
    if (s.area && s.pts.length>1){
      const gid="g"+(gradN++);
      defs += `<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0A84FF" stop-opacity=".18"/>
        <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/></linearGradient>`;
      out += `<path d="${path} L ${X(s.pts.length-1).toFixed(1)} ${H-P} L ${X(0).toFixed(1)} ${H-P} Z" fill="url(#${gid})"/>`;
    }
    out += `<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2" ${s.dash?`stroke-dasharray="${s.dash}"`:""} stroke-linecap="round"/>`;
    out += s.pts.map((p,i)=>{
      const isPr = s===main && prVal!=null && p.v===prVal;
      let str = `<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="${isPr?5.5:3.5}" fill="${isPr?"var(--gold)":s.color}"/>`;
      if (s.showLabels) str += `<text x="${X(i).toFixed(1)}" y="${(Y(p.v)-11).toFixed(1)}" text-anchor="middle" fill="${isPr?"var(--gold)":"#6B7280"}" font-size="11" font-weight="600" font-family="ui-monospace,Menlo,monospace">${fmt(p.v)}${isPr?" PR":""}</text>`;
      return str;
    }).join("");
  }
  const labels = main.pts.map((p,i)=> (n<=8 || i%2===0 || i===n-1) ?
    `<text x="${X(i).toFixed(1)}" y="${H-10}" text-anchor="middle" fill="#4E5560" font-size="10" font-family="ui-monospace,Menlo,monospace">${dShort(p.date)}</text>`:"").join("");
  const goalLine = goal!=null ? `<line x1="${P}" x2="${W-P}" y1="${Y(goal)}" y2="${Y(goal)}" stroke="var(--legs)" stroke-dasharray="5 5" stroke-width="1.5"/>
    <text x="${W-P}" y="${Y(goal)-8}" text-anchor="end" fill="var(--legs)" font-size="11" font-weight="600" font-family="ui-monospace,Menlo,monospace">Ziel ${fmt(goal)} ${unit}</text>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Liniendiagramm"><defs>${defs}</defs>
    <line x1="${P}" x2="${W-P}" y1="${H-P}" y2="${H-P}" stroke="rgba(255,255,255,.08)"/>
    ${goalLine}${out}${labels}</svg>`;
}
/* Dual-Achsen-Chart: zwei Serien mit unabhängigen Y-Skalen, gemeinsame X-Achse (Datum) */
function dualAxisChart(seriesA, seriesB, labelA, labelB, colorA, colorB){
  if (!seriesA.length) return '<div class="mut">Noch keine Daten.</div>';
  const W=520,H=240,P=44;
  const n=seriesA.length;
  const X=i=> n===1 ? W/2 : P+(i/(n-1))*(W-2*P);
  function scale(vals){
    let min=Math.min(...vals), max=Math.max(...vals);
    if (min===max){ min-=1; max+=1; } const pad=(max-min)*.18; return {min:min-pad, max:max+pad};
  }
  const sa=scale(seriesA.map(p=>p.v)), sb=scale(seriesB.map(p=>p.v));
  const Ya=v=> H-P-((v-sa.min)/(sa.max-sa.min))*(H-2*P);
  const Yb=v=> H-P-((v-sb.min)/(sb.max-sb.min))*(H-2*P);
  const pathA = seriesA.map((p,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Ya(p.v).toFixed(1)).join(" ");
  const pathB = seriesB.map((p,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Yb(p.v).toFixed(1)).join(" ");
  const dotsA = seriesA.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Ya(p.v).toFixed(1)}" r="3.5" fill="${colorA}"/>`).join("");
  const dotsB = seriesB.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Yb(p.v).toFixed(1)}" r="3.5" fill="${colorB}"/>`).join("");
  const labels = seriesA.map((p,i)=> (n<=8 || i%2===0 || i===n-1) ?
    `<text x="${X(i).toFixed(1)}" y="${H-10}" text-anchor="middle" fill="#4E5560" font-size="10" font-family="ui-monospace,Menlo,monospace">${dShort(p.date)}</text>`:"").join("");
  /* Achsen-Beschriftung min/max links/rechts */
  const axisA = `<text x="2" y="${(P-6).toFixed(1)}" fill="${colorA}" font-size="10" font-weight="600" font-family="ui-monospace,Menlo,monospace">${fmt(sa.max)}</text>
    <text x="2" y="${(H-P+14).toFixed(1)}" fill="${colorA}" font-size="10" font-weight="600" font-family="ui-monospace,Menlo,monospace">${fmt(sa.min)}</text>`;
  const axisB = `<text x="${W-2}" y="${(P-6).toFixed(1)}" text-anchor="end" fill="${colorB}" font-size="10" font-weight="600" font-family="ui-monospace,Menlo,monospace">${fmt(sb.max)}</text>
    <text x="${W-2}" y="${(H-P+14).toFixed(1)}" text-anchor="end" fill="${colorB}" font-size="10" font-weight="600" font-family="ui-monospace,Menlo,monospace">${fmt(sb.min)}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Recomp-Chart">
    <line x1="${P}" x2="${W-P}" y1="${H-P}" y2="${H-P}" stroke="rgba(255,255,255,.08)"/>
    ${axisA}${axisB}
    <path d="${pathA}" fill="none" stroke="${colorA}" stroke-width="2" stroke-linecap="round"/>
    <path d="${pathB}" fill="none" stroke="${colorB}" stroke-width="2" stroke-linecap="round"/>
    ${dotsA}${dotsB}${labels}</svg>
    <div class="row" style="margin-top:8px; justify-content:center; gap:14px">
      <span class="chip"><span class="dot" style="background:${colorA}"></span>${labelA}</span>
      <span class="chip"><span class="dot" style="background:${colorB}"></span>${labelB}</span>
    </div>`;
}
function barChart(weeks, data){
  if (!weeks.length) return '<div class="mut">Noch keine Daten.</div>';
  const W=520,H=240,P=36;
  const max=Math.max(1,...weeks.flatMap(w=>Object.keys(TYPES).map(t=>data[w][t])));
  const gw=(W-2*P)/weeks.length, bw=Math.min(24,(gw-18)/3);
  let bars="", labels="";
  weeks.forEach((w,i)=>{
    Object.keys(TYPES).forEach((t,ti)=>{
      const v=data[w][t], h=(v/max)*(H-2*P);
      const x=P+i*gw+gw/2-(bw*1.5)+ti*bw;
      bars+=`<rect x="${x.toFixed(1)}" y="${(H-P-h).toFixed(1)}" width="${(bw-4).toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" rx="3" fill="${TYPES[t].color}" opacity=".9"/>`;
      if (v) bars+=`<text x="${(x+(bw-4)/2).toFixed(1)}" y="${(H-P-h-5).toFixed(1)}" text-anchor="middle" fill="#6B7280" font-size="9" font-family="ui-monospace,Menlo,monospace">${v>=1000?Math.round(v/100)/10+"k":v}</text>`;
    });
    labels+=`<text x="${(P+i*gw+gw/2).toFixed(1)}" y="${H-10}" text-anchor="middle" fill="#4E5560" font-size="10" font-family="ui-monospace,Menlo,monospace">KW ${w.split("-W")[1]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Balkendiagramm">
    <line x1="${P}" x2="${W-P}" y1="${H-P}" y2="${H-P}" stroke="rgba(255,255,255,.08)"/>${bars}${labels}</svg>`;
}

/* ---------- REPORT (Heatmap + Woche + Monat) ---------- */
let repTab="month";
let repY=null, repM=null;
function vReport(){
  if (repY===null){ const t=new Date(); repY=t.getFullYear(); repM=t.getMonth(); }
  const seg = `<div class="seg">
    <button class="${repTab==="month"?"on":""}" onclick="repTab='month';render()">Monat</button>
    <button class="${repTab==="week"?"on":""}" onclick="repTab='week';render()">Woche</button></div>`;
  return `<h1>Report</h1><p class="sub">Trainings-Übersicht & Auswertung</p>${seg}
    ${repTab==="month" ? monthReport() : weekReport()}`;
}
function repNav(d){
  repM += d;
  if (repM<0){ repM=11; repY--; } if (repM>11){ repM=0; repY++; }
  render();
}
function monthKey(){ return repY+"-"+String(repM+1).padStart(2,"0"); }
function monthReport(){
  const mk = monthKey();
  const inMonth = S.sessions.filter(s=>s.date.startsWith(mk));
  /* Heatmap */
  const first = new Date(repY, repM, 1);
  const startDow = (first.getDay()+6)%7;
  const daysIn = new Date(repY, repM+1, 0).getDate();
  const byDay = {};
  for (const s of inMonth){ const d=+s.date.slice(8); (byDay[d]=byDay[d]||[]).push(s.type); }
  const tday = todayStr();
  let cells = ["Mo","Di","Mi","Do","Fr","Sa","So"].map(h=>`<div class="hd">${h}</div>`).join("");
  for (let i=0;i<startDow;i++) cells += `<div class="cell blank"></div>`;
  for (let d=1; d<=daysIn; d++){
    const iso = mk+"-"+String(d).padStart(2,"0");
    const types = byDay[d]||[];
    const dots = types.slice(0,3).map(t=>`<span class="d" style="background:${TYPES[t].color}"></span>`).join("");
    cells += `<div class="cell ${types.length?"has":""} ${iso===tday?"today":""}">
      <span>${d}</span><span class="dots">${dots}</span></div>`;
  }
  /* KPIs */
  const vol = inMonth.reduce((n,s)=>n+sessionVolume(s),0);
  const days = new Set(inMonth.map(s=>s.date)).size;
  const counts = {push:0,pull:0,legs:0};
  inMonth.forEach(s=>counts[s.type]++);
  /* Top-Progressionen */
  const prog = [];
  for (const exId of Object.keys(S.exercises)){
    const ex = S.exercises[exId];
    const list = [...S.sessions].filter(s=>s.date.startsWith(mk))
      .sort((a,b)=>a.date<b.date?-1:1)
      .map(s=>{ const e=s.entries.find(x=>x.exerciseId===exId);
        return e&&e.sets.length ? Math.max(...e.sets.map(st=> ex.unit==="seconds"?(st.seconds||0):(st.kg||0))) : null; })
      .filter(v=>v!==null);
    if (list.length<2) continue;
    const d = list[list.length-1]-list[0];
    if (d>0) prog.push({name:ex.name, from:list[0], to:list[list.length-1], d,
      pct: list[0]>0 ? Math.round(d/list[0]*100) : 0, u: ex.unit==="seconds"?"s":"kg"});
  }
  prog.sort((a,b)=>b.pct-a.pct);
  const progHtml = prog.slice(0,5).map(p=>`<div class="list-item">
    <div class="grow"><b>${esc(p.name)}</b>
      <div class="mut num">${fmt(p.from)} → ${fmt(p.to)} ${p.u}</div></div>
    <span class="delta up">+${fmt(p.d)} ${p.u} · +${p.pct}%</span></div>`).join("")
    || '<div class="mut">Mind. 2 Sessions pro Übung nötig für einen Vergleich.</div>';
  /* PRs des Monats */
  const prs = [];
  for (const exId of Object.keys(S.exercises)){
    const pr = prFor(exId);
    if (pr && pr.date.startsWith(mk))
      prs.push({name:S.exercises[exId].name, ...pr, u:S.exercises[exId].unit==="seconds"?"s":"kg"});
  }
  const prHtml = prs.map(p=>`<div class="list-item">
    <span class="pr">PR</span><div class="grow"><b>${esc(p.name)}</b></div>
    <span class="num small"><b>${fmt(p.val)} ${p.u}</b>${p.u==="kg"?" × "+p.reps:""} <span class="mut">· ${dShort(p.date)}</span></span></div>`).join("")
    || '<div class="mut">Keine PRs in diesem Monat.</div>';
  /* Körpergewicht + Trend */
  const bwAll = [...S.bodyweight.log].sort((a,b)=>a.date<b.date?-1:1);
  const bwM = bwAll.filter(e=>e.date.startsWith(mk));
  let bwHtml = '<div class="mut">Keine Gewichtseinträge in diesem Monat.</div>';
  if (bwM.length){
    const d = bwM[bwM.length-1].kg - bwM[0].kg;
    bwHtml = `<div class="row"><div class="grow"><b class="num">${fmt(bwM[0].kg)} → ${fmt(bwM[bwM.length-1].kg)} kg</b></div>
      <span class="delta ${d<0?"up":d>0?"down":"flat"}">${d>0?"+":""}${fmt(d)} kg</span></div>`;
  }
  let etaHtml = "";
  if (bwAll.length>=2){
    const t0 = new Date(bwAll[0].date+"T12:00:00").getTime();
    const xs = bwAll.map(e=>(new Date(e.date+"T12:00:00").getTime()-t0)/864e5);
    const ys = bwAll.map(e=>e.kg);
    const nP=xs.length, sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
    const sxy=xs.reduce((a,x,i)=>a+x*ys[i],0), sxx=xs.reduce((a,x)=>a+x*x,0);
    const denom = nP*sxx-sx*sx;
    const slope = denom!==0 ? (nP*sxy-sx*sy)/denom : 0;
    const lastE = bwAll[bwAll.length-1];
    if (slope < -0.005 && lastE.kg > S.bodyweight.goalKg){
      const daysTo = (lastE.kg - S.bodyweight.goalKg)/(-slope);
      const eta = addDays(lastE.date, Math.round(daysTo));
      etaHtml = `<div class="hint up" style="margin-top:10px">Trend ${fmt(slope*7)} kg/Woche → Ziel ${fmt(S.bodyweight.goalKg)} kg erreicht ≈ <b class="num">${dLong(eta)}</b></div>`;
    } else if (lastE.kg <= S.bodyweight.goalKg){
      etaHtml = `<div class="hint up" style="margin-top:10px">Ziel erreicht.</div>`;
    } else {
      etaHtml = `<div class="hint" style="margin-top:10px">Noch kein Abwärtstrend erkennbar – mehr Gewichtseinträge helfen für eine Prognose.</div>`;
    }
  }
  return `<div class="card">
    <div class="row">
      <button class="btn ghost" onclick="repNav(-1)" style="font-size:19px">‹</button>
      <div class="grow" style="text-align:center"><b>${MONTHS[repM]} ${repY}</b></div>
      <button class="btn ghost" onclick="repNav(1)" style="font-size:19px">›</button></div>
    <div class="cal">${cells}</div>
    <div class="row" style="margin-top:12px; justify-content:center; gap:10px">
      ${Object.keys(TYPES).map(t=>`<span class="chip"><span class="dot" style="background:${TYPES[t].color}"></span>${TYPES[t].label} <span class="num">${counts[t]}×</span></span>`).join("")}
    </div></div>
  <div class="kpis">
    <div class="kpi"><b>${inMonth.length}</b><span>Sessions</span></div>
    <div class="kpi"><b>${days}</b><span>Trainingstage</span></div>
    <div class="kpi"><b>${vol>=1000?fmt(Math.round(vol/100)/10)+"k":fmt(vol)}</b><span>Volumen kg</span></div>
  </div>
  <h2>Top-Progressionen</h2><div class="card">${progHtml}</div>
  <h2>PRs des Monats</h2><div class="card">${prHtml}</div>
  <h2>Körpergewicht</h2><div class="card">${bwHtml}${etaHtml}</div>`;
}
function weekReport(){
  const wb = weekBounds(todayStr());
  const lb = weekBounds(addDays(wb.mon,-1));
  const inRange = (s,b)=> s.date>=b.mon && s.date<=b.sun;
  const cur = S.sessions.filter(s=>inRange(s,wb));
  const prev = S.sessions.filter(s=>inRange(s,lb));
  const volBy = list => { const v={push:0,pull:0,legs:0}; list.forEach(s=>v[s.type]+=sessionVolume(s)); return v; };
  const cv=volBy(cur), pv=volBy(prev);
  const deltaHtml = t => {
    if (pv[t]===0 && cv[t]===0) return '<span class="delta flat">–</span>';
    if (pv[t]===0) return '<span class="delta up">neu</span>';
    const pct = Math.round((cv[t]-pv[t])/pv[t]*100);
    return `<span class="delta ${pct>0?"up":pct<0?"down":"flat"}">${pct>0?"↑ +":pct<0?"↓ ":""}${pct}%</span>`;
  };
  const rows = Object.keys(TYPES).map(t=>`<div class="list-item">
    <span class="dot" style="background:${TYPES[t].color}; width:9px; height:9px"></span>
    <div class="grow"><b>${TYPES[t].label}</b>
      <div class="mut num">${fmt(cv[t])} kg <span style="color:var(--dim)">(Vorwoche ${fmt(pv[t])})</span></div></div>
    ${deltaHtml(t)}</div>`).join("");
  const prs=[];
  for (const exId of Object.keys(S.exercises)){
    const pr=prFor(exId);
    if (pr && pr.date>=wb.mon && pr.date<=wb.sun)
      prs.push({name:S.exercises[exId].name, ...pr, u:S.exercises[exId].unit==="seconds"?"s":"kg"});
  }
  const prHtml = prs.map(p=>`<div class="list-item">
    <span class="pr">PR</span><div class="grow"><b>${esc(p.name)}</b></div>
    <span class="num small"><b>${fmt(p.val)} ${p.u}</b>${p.u==="kg"?" × "+p.reps:""}</span></div>`).join("")
    || '<div class="mut">Keine neuen PRs diese Woche.</div>';
  return `<div class="kpis">
    <div class="kpi"><b>${cur.length}</b><span>Sessions (VW ${prev.length})</span></div>
    <div class="kpi"><b>${fmt(cur.reduce((n,s)=>n+sessionVolume(s),0))}</b><span>Volumen kg</span></div>
    <div class="kpi"><b>${prs.length}</b><span>Neue PRs</span></div>
  </div>
  <div class="card"><div class="lbl">Mo ${dShort(wb.mon)} – So ${dShort(wb.sun)} vs. Vorwoche</div>
    <div style="margin-top:6px">${rows}</div></div>
  <h2>PRs dieser Woche</h2><div class="card">${prHtml}</div>`;
}

const STATES = [
  { key:"faul",      name:"Faul",      min:0, anim:"marble-lazy",   desc:"Die Murmel döst vor sich hin." },
  { key:"traege",    name:"Träge",     min:2, anim:"marble-float",  desc:"Kommt langsam in Bewegung." },
  { key:"aktiv",     name:"Aktiv",     min:4, anim:"marble-float",  desc:"Solide am Rollen." },

function entryMetricE1(ex, e){
  if (ex.unit==="seconds") return Math.max(...e.sets.map(s=>s.seconds||0));
  return Math.max(...e.sets.map(s=>e1rm(s.kg||0, s.reps||0)));
}
function entryPR(ex, e){
  if (ex.unit==="seconds") return { val:Math.max(...e.sets.map(s=>s.seconds||0)), reps:0 };
  const val = Math.max(...e.sets.map(s=>s.kg||0));
  const reps = Math.max(...e.sets.filter(s=>(s.kg||0)===val).map(s=>s.reps||0));
  return { val, reps };
}
function computeGami(){
  const sorted = [...S.sessions].filter(s=>s.date<=todayStr())
    .sort((a,b)=> a.date<b.date?-1 : a.date>b.date?1 : (a.id<b.id?-1:1));
  const prevE1={}, bestPR={}, weekCnt={};
  let total=0, totals={consistency:0, progression:0, pr:0, weekly:0};
  const per=[];
  for (const s of sorted){
    const bd={consistency:10, progression:0, pr:0, weekly:0};
    for (const e of s.entries){
      const ex=S.exercises[e.exerciseId]; if(!ex || !e.sets.length) continue;
      const curE1 = entryMetricE1(ex, e);
      const pr = entryPR(ex, e);
      if (prevE1[e.exerciseId]!==undefined && curE1 > prevE1[e.exerciseId]+1e-6) bd.progression += 5;
      const b = bestPR[e.exerciseId];
      if (b!==undefined && (pr.val > b.val+1e-6 || (Math.abs(pr.val-b.val)<1e-6 && pr.reps > b.reps))) bd.pr += 25;
      prevE1[e.exerciseId] = curE1;
      if (b===undefined || pr.val > b.val || (Math.abs(pr.val-b.val)<1e-6 && pr.reps>b.reps)) bestPR[e.exerciseId]=pr;
    }
    const wk=isoWeek(s.date); weekCnt[wk]=(weekCnt[wk]||0)+1;
    if (weekCnt[wk]===S.settings.weeklyGoal) bd.weekly=50;
    const pts = bd.consistency+bd.progression+bd.pr+bd.weekly;
    total += pts;
    for (const k in totals) totals[k]+=bd[k];
    per.push({ id:s.id, date:s.date, type:s.type, pts, bd });
  }
  /* Rang */
  let rank=RANKS[0], next=null;
  for (let i=0;i<RANKS.length;i++){ if (total>=RANKS[i].min){ rank=RANKS[i]; next=RANKS[i+1]||null; } }
  const prog = next ? (total-rank.min)/(next.min-rank.min) : 1;
  /* Zustand: Sessions der letzten 14 Tage */
  const cut = addDays(todayStr(), -13);
  const recent = S.sessions.filter(s=>s.date>=cut && s.date<=todayStr()).length;
  let state=STATES[0];
  for (const st of STATES) if (recent>=st.min) state=st;
  return { total, totals, per:per.reverse(), rank, next, prog, state, recent };
}

const SEASON_EPOCH = "2026-06-01"; /* Montag */
function weeksMap(){ const m={}; for(const s of S.sessions){ if(s.date>todayStr()) continue; const w=isoWeek(s.date); m[w]=(m[w]||0)+1; } return m; }
function consistencyScore(){
  const goal=S.settings.weeklyGoal; const m=weeksMap();
  const weeks=[]; let d=todayStr();
  for(let i=0;i<4;i++){ weeks.push(isoWeek(d)); d=addDays(d,-7); }
  const ratios=weeks.map(w=>Math.min((m[w]||0)/goal,1));
  const score=Math.round(ratios.reduce((a,b)=>a+b,0)/ratios.length*100);
  const label= score>=85?"Eisern":score>=60?"Stabil":score>=35?"Wechselhaft":"Lückenhaft";
  return {score,label};
}
function streakInfo(){
  const goal=S.settings.weeklyGoal, m=weeksMap();
  if(!S.sessions.length) return {streak:0, curCount:0, goal, curDone:false, freezes:0};
  const firstMon=weekBounds([...S.sessions].map(s=>s.date).sort()[0]).mon;
  const curWeek=isoWeek(todayStr());
  const curCount=m[curWeek]||0;
  let mon=addDays(weekBounds(todayStr()).mon,-7);
  let streak=0, freezes=0, freezeMonth={};
  while(mon>=firstMon){
    const w=isoWeek(mon), cnt=m[w]||0;
    if(cnt>=goal){ streak++; }
    else { const mo=mon.slice(0,7); if(!freezeMonth[mo]){ freezeMonth[mo]=true; freezes++; } else break; }
    mon=addDays(mon,-7);
  }
  return {streak, curCount, goal, curDone:curCount>=goal, freezes};
}
function seasonInfo(g){
  const epoch=new Date(SEASON_EPOCH+"T12:00:00").getTime();
  const today=new Date(todayStr()+"T12:00:00").getTime();
  const dayIdx=Math.floor((today-epoch)/864e5);
  const sIdx=Math.max(0,Math.floor(dayIdx/28));
  const start=addDays(SEASON_EPOCH, sIdx*28), end=addDays(start,27);
  const daysLeft=28-((((dayIdx%28)+28)%28));
  let pts=0; for(const p of g.per){ if(p.date>=start && p.date<=end) pts+=p.pts; }
  return {num:sIdx+1, start, end, daysLeft:Math.max(1,daysLeft), pts};
}

function weeklyQuest(g){
  const wk=isoWeek(todayStr());
  const pool=[
    {key:"improve3",name:"Steigere 3 Übungen",desc:"Bei 3 Übungen mehr als zuletzt schaffen.",target:3},
    {key:"days3",name:"3 Trainingstage",desc:"An 3 verschiedenen Tagen trainieren.",target:3},
    {key:"pr1",name:"Knacke einen PR",desc:"Eine neue Bestleistung aufstellen.",target:1},
    {key:"goal",name:"Wochenziel erreichen",desc:S.settings.weeklyGoal+" Sessions diese Woche.",target:S.settings.weeklyGoal},
  ];
  const wnum=parseInt((wk.split("-W")[1]||"0"),10);
  const q=pool[wnum % pool.length];
  const tw=g.per.filter(p=>isoWeek(p.date)===wk);
  let prog=0;
  if(q.key==="improve3") prog=tw.reduce((a,p)=>a+p.bd.progression/5,0);
  else if(q.key==="days3") prog=new Set(tw.map(p=>p.date)).size;
  else if(q.key==="pr1") prog=tw.reduce((a,p)=>a+p.bd.pr/25,0);
  else prog=tw.length;
  prog=Math.round(prog);
  return {...q, prog:Math.min(prog,q.target), raw:prog, done:prog>=q.target};
}

function sessionHighlights(sid){
