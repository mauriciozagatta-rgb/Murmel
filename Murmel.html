function sessionHighlights(sid){
  const sorted=[...S.sessions].filter(s=>s.date<=todayStr())
    .sort((a,b)=> a.date<b.date?-1 : a.date>b.date?1 : (a.id<b.id?-1:1));
  const prevE1={}, bestPR={}; const out={improved:[], prs:[]};
  for(const s of sorted){
    for(const e of s.entries){
      const ex=S.exercises[e.exerciseId]; if(!ex||!e.sets.length) continue;
      const curE1=entryMetricE1(ex,e), pr=entryPR(ex,e);
      const improved = prevE1[e.exerciseId]!==undefined && curE1>prevE1[e.exerciseId]+1e-6;
      const b=bestPR[e.exerciseId];
      const isPR = b!==undefined && (pr.val>b.val+1e-6 || (Math.abs(pr.val-b.val)<1e-6 && pr.reps>b.reps));
      if(s.id===sid){
        if(improved) out.improved.push(ex.name);
        if(isPR) out.prs.push({name:ex.name, val:pr.val, reps:pr.reps, unit:ex.unit==="seconds"?"s":"kg"});
      }
      prevE1[e.exerciseId]=curE1;
      if(b===undefined||pr.val>b.val||(Math.abs(pr.val-b.val)<1e-6&&pr.reps>b.reps)) bestPR[e.exerciseId]=pr;
    }
    if(s.id===sid) break;
  }
  return out;
}

/* v3.0: Shop-Katalog — verkauft bestehende Skins per Münzen als alternativen Freischaltweg */

  headband:{ name:"Stirnband", price:300, desc:"Sportliches Stirnband" },

  crown:{    name:"Krone",     price:700, desc:"Königliche Krone" },
};
function buySeasonSkin(){
  const g=computeGami(), se=seasonInfo(g);
  if(se.num%3!==2){ toast("Dieser Saison-Skin ist nicht per Münzen erhältlich"); return; }
  const k="season_"+se.num; S.gami.owned=S.gami.owned||{};
  if(S.gami.owned[k]){ toast("Schon im Besitz ✅"); return; }
  const bal=Math.max(0,g.coinsEarned-(S.gami.spent||0));
  if(bal<400){ toast("Zu wenig Münzen: "+bal+"/400 🪙"); return; }
  S.gami.spent=(S.gami.spent||0)+400; S.gami.owned[k]=true;
  save(); render(); toast("Saison-"+se.num+"-Skin freigeschaltet! ✨");
}
function buySkin(k){
  const it=SHOP_SKINS[k]; if(!it) return;
  S.gami.owned = S.gami.owned || {};
  if(S.gami.owned[k]){ toast("Schon im Besitz"); return; }
  const g=computeGami(); const bal=Math.max(0, g.coinsEarned-(S.gami.spent||0));
  if(bal<it.price){ toast("Zu wenig Münzen: "+bal+"/"+it.price+" 🪙"); return; }
  S.gami.spent=(S.gami.spent||0)+it.price;
  S.gami.owned[k]=true;
  save(); render(); toast(it.name+" gekauft! ✨");
}
function doPrestige(){
  const g=computeGami();
  if(g.rank.key!=="legende"){ toast("Erst Legende erreichen"); return; }
  if(!confirm("Wiedergeburt: Dein Rang startet neu bei Holz und du erhältst einen Prestige-Stern ★. Gesamt-XP und Historie bleiben erhalten. Fortfahren?")) return;
  S.gami.prestige=(S.gami.prestige||0)+1;
  S.gami.lastRankSeen="holz";
  save(); render();
  try{ spawnConfetti(); }catch(e){}
  toast("Wiedergeburt! Prestige ★"+S.gami.prestige+" 🎉");
}

/* ===== v3.0: WELLE C — DAILY QUEST ===== */
function dailyQuest(){
  const today=todayStr(), dq=S.gami.daily;
  if(!dq || dq.date!==today){
    const dayNum=Math.floor(new Date(today+"T12:00:00").getTime()/86400000);
    const def=DAILY_POOL[dayNum % DAILY_POOL.length];
    const nd={date:today,key:def.key,name:def.name,desc:def.desc,target:def.target,done:false,claimed:false};
    S.gami.daily=nd; save(); return nd;
  }
  return dq;
}
function dailyQuestProg(dq,g){
  const today=todayStr();
  const ts=S.sessions.filter(s=>s.date===today);
  if(dq.key==="train"||dq.key==="nobreak") return Math.min(1,ts.length);
  if(dq.key==="improve1") return Math.min(1,g.per.filter(p=>p.date===today&&p.bd.progression>0).length);
  if(dq.key==="setcount") return ts.reduce((n,s)=>n+s.entries.reduce((m,e)=>m+e.sets.length,0),0);
  if(dq.key==="rirlog") return ts.reduce((n,s)=>n+s.entries.reduce((m,e)=>m+e.sets.filter(st=>st.rir!=null).length,0),0);
  return 0;
}
function checkAndClaimDailyQuest(){
  try{
    const dq=dailyQuest(); if(dq.claimed) return;
    const g=computeGami(), prog=dailyQuestProg(dq,g);
    if(prog>=dq.target){
      S.gami.daily.done=true; S.gami.daily.claimed=true;
      S.gami.bonusCoins=(S.gami.bonusCoins||0)+5; save();
      setTimeout(()=>toast("Tagesquest erfüllt! +5 🪙 ✅"),800);
    }
  }catch(e){}
}

/* ===== v3.0: WELLE C — STORY-KETTEN ===== */
function chainStepProg(step,startDate,g){
  const sa=S.sessions.filter(s=>s.date>=startDate&&s.date<=todayStr());
  const pa=g.per.filter(p=>p.date>=startDate&&p.date<=todayStr());
  if(step.type==="sess_type") return Math.min(step.target,sa.filter(s=>s.type===step.stype).length);
  if(step.type==="ex_prog")
    return sa.some(s=>s.entries.some(e=>e.exerciseId===step.exId)&&pa.find(p=>p.id===s.id)?.bd.progression>0)?1:0;
  if(step.type==="pr_muscle")
    return sa.some(s=>s.entries.some(e=>S.exercises[e.exerciseId]?.muscle===step.muscle)&&pa.find(p=>p.id===s.id)?.bd.pr>0)?1:0;
  return 0;
}
function activeChainData(g){
  const gc=S.gami;
  let ch=gc.chain;
  const allDone=ch&&ch.claimedSteps&&ch.claimedSteps.every(Boolean);
  if(!ch||!STORY_CHAINS.find(c=>c.id===ch.id)||allDone){
    const done=gc.completedChains||[];
    let next=STORY_CHAINS.find(c=>!done.includes(c.id))||STORY_CHAINS[done.length%STORY_CHAINS.length];
    ch={id:next.id,startDate:todayStr(),claimedSteps:next.steps.map(()=>false)};
    gc.chain=ch; save();
  }
  const def=STORY_CHAINS.find(c=>c.id===ch.id); if(!def) return null;
  const curStep=ch.claimedSteps.findIndex(b=>!b);
  const stepsData=def.steps.map((st,i)=>{
    const claimed=ch.claimedSteps[i], isCur=i===curStep;
    const prog=claimed?st.target:(isCur?chainStepProg(st,ch.startDate,g):0);
    return {...st,claimed,isCur,prog,done:claimed||prog>=st.target};
  });
  return {def,ch,stepsData,curStep,allDone:stepsData.every(s=>s.claimed)};
}
function claimChainStep(){
  const g=computeGami(), cd=activeChainData(g); if(!cd) return;
  const {def,stepsData,curStep}=cd; if(curStep<0||curStep>=def.steps.length) return;
  if(!stepsData[curStep].done){toast("Etappe noch nicht erfüllt ⏳");return;}
  S.gami.chain.claimedSteps[curStep]=true;
  const isLast=curStep===def.steps.length-1;
  if(isLast){
    S.gami.bonusCoins=(S.gami.bonusCoins||0)+def.reward.coins;
    S.gami.completedChains=[...(S.gami.completedChains||[]),def.id];
    S.gami.trophies=S.gami.trophies||{};
    S.gami.trophies["chain_"+def.id]={ts:Date.now(),kind:"chain",name:def.reward.trophyName};
    /* Season-Skin bei Ketten-Saison (num%3===0) */
    const _cse=seasonInfo(g); if(_cse.num%3===0){ S.gami.owned=S.gami.owned||{}; S.gami.owned["season_"+_cse.num]=true; }
    save();render();try{spawnConfetti();}catch(e){}
    toast(def.name+" abgeschlossen! +"+def.reward.coins+" 🪙 🏆");
  } else { save();render();toast("Etappe "+(curStep+1)+" ✓ — weiter zur nächsten!"); }
}

/* ===== v3.0: WELLE C — MONATS-BOSS ===== */
function monthBoss(g){
  const ym=todayStr().slice(0,7);
  const mNum=parseInt(todayStr().slice(5,7),10)-1;
  const def=BOSS_POOL[mNum%BOSS_POOL.length];
  const prog=Math.min(def.target,def.prog(g,ym));
  const defeated=!!(S.gami.boss&&S.gami.boss[ym]==="defeated");
  return {...def,prog,defeated,pct:prog/def.target,ym};
}
function defeatBoss(){
  const g=computeGami(), b=monthBoss(g);
  if(b.defeated){toast("Boss bereits besiegt! 🎉");return;}
  if(b.prog<b.target){toast(b.icon+" Noch nicht besiegt: "+b.prog+"/"+b.target+" "+b.unit);return;}
  S.gami.boss=S.gami.boss||{};S.gami.boss[b.ym]="defeated";
  S.gami.bonusCoins=(S.gami.bonusCoins||0)+100;
  S.gami.trophies=S.gami.trophies||{};
  S.gami.trophies["boss_"+b.ym]={ts:Date.now(),kind:"boss",name:b.name};

  const _bse=seasonInfo(g); if(_bse.num%3===1){ S.gami.owned=S.gami.owned||{}; S.gami.owned["season_"+_bse.num]=true; }

}

/* ===== v3.0: WELLE C — SCHATTEN ===== */
function shadowData(g){
  const se=seasonInfo(g); if(se.num<=1) return null;
  const curStart=se.start, prevStart=addDays(curStart,-28);
  const dayOff=Math.max(0,Math.floor((new Date(todayStr()+"T12:00:00")-new Date(curStart+"T12:00:00"))/86400000));
  const sameDay=addDays(prevStart,Math.min(dayOff,27));
  const prevPts=g.per.filter(p=>p.date>=prevStart&&p.date<=sameDay).reduce((a,p)=>a+p.pts,0);
  return {curPts:se.pts,prevPts,ahead:se.pts-prevPts,dayOff,prevNum:se.num-1};
}

/* ===== v3.0: WELLE D — JAHRES-HEATMAP ===== */
function yearHeatmapSVG(){
  const today=todayStr();
  const td=new Date(today+"T12:00:00"), tdDay=td.getDay();
  const monOff=tdDay===0?-6:1-tdDay;
  const gridStart=addDays(addDays(today,monOff),-52*7);
  const sm={}; for(const s of S.sessions) if(!sm[s.date]) sm[s.date]=s.type;
  const C=7,G=1,St=C+G, LX=26,TY=18, cols=53;
  const tc={push:"#FF453A",pull:"#0A84FF",legs:"#30D158"};
  const mNames=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  let cells="",months="",lastM="";
  for(let w=0;w<cols;w++){
    for(let d=0;d<7;d++){
      const date=addDays(gridStart,w*7+d); if(date>today) continue;
      const type=sm[date];
      cells+=`<rect x="${LX+w*St}" y="${TY+d*St}" width="${C}" height="${C}" rx="1.5" fill="${type?tc[type]:"#1A1D22"}" opacity="${type?"1":".5"}"/>`;
      if(d===0){ const mo=date.slice(0,7); if(mo!==lastM){ lastM=mo; const mi=parseInt(date.slice(5,7),10)-1; months+=`<text x="${LX+w*St}" y="${TY-3}" font-size="8" fill="#4E5560" font-family="-apple-system,sans-serif">${mNames[mi]}</text>`; } }
    }
  }
  const dayLbls=[["Mo",0],["Mi",2],["Fr",4]].map(([l,r])=>`<text x="${LX-2}" y="${TY+r*St+C-1}" font-size="7" fill="#4E5560" text-anchor="end" font-family="-apple-system,sans-serif">${l}</text>`).join("");
  const W=LX+cols*St+2, H=TY+7*St+4;
  const legend=`<div class="row" style="margin-top:8px;gap:10px;font-size:11px;color:var(--mut)">
    <span><svg width="9" height="9" style="vertical-align:middle"><rect width="9" height="9" rx="1.5" fill="#FF453A"/></svg> Push</span>
    <span><svg width="9" height="9" style="vertical-align:middle"><rect width="9" height="9" rx="1.5" fill="#0A84FF"/></svg> Pull</span>
    <span><svg width="9" height="9" style="vertical-align:middle"><rect width="9" height="9" rx="1.5" fill="#30D158"/></svg> Legs</span>
    <span class="num" style="margin-left:auto">${S.sessions.length} Sessions gesamt</span>
  </div>`;
  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;min-width:${W}px">${months}${dayLbls}${cells}</svg></div>${legend}`;
}

  $("exportTa").value = json;
  S.settings.lastBackup = new Date().toISOString(); save();
  try { await navigator.clipboard.writeText(json); toast("In Zwischenablage kopiert ✓"); }
  catch(e){ toast("Bitte manuell kopieren"); }
}
function setExRest(id, delta /* Sekunden-Delta, positiv = mehr, negativ = weniger */){
  const ex=S.exercises[id];
  let v=(ex.restSeconds||S.settings.restSeconds)+delta;
  if(v<=0 || v<15){ ex.restSeconds=null; } else { ex.restSeconds=v; }
  save(); render();
}
function importData(btn){
  const raw = ($("importTa").value||"").trim();
  if (!raw){ toast("Bitte JSON einfügen"); return; }
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch(e){ toast("Ungültiges JSON"); return; }
  if (!parsed || !parsed.sessions || !parsed.exercises){ toast("Kein gültiger Export"); return; }
  if (!btn.dataset.arm){ btn.dataset.arm="1"; btn.textContent="Alle Daten überschreiben? Nochmal tippen";
    setTimeout(()=>{ if(btn.isConnected){ delete btn.dataset.arm; btn.textContent="Daten importieren"; }}, 4000); return; }
  S = parsed; save(); toast("Daten importiert ✓"); go("home");
}
function runBodyCsvImport(text){
  if (!text || !text.trim()){ $("bodyCsvResult").textContent="Keine Daten gefunden."; return; }
  const res = importBodyCsv(text);
  if (res.fmt==="unknown"){ $("bodyCsvResult").textContent="Format nicht erkannt – RENPHO- oder Ultrahuman-CSV erwartet."; return; }
  save(); render();
  toast("Körperdaten importiert ✓");
}
function importBodyCsvFromTa(){
  runBodyCsvImport($("bodyCsvTa").value);
}
function handleBodyCsvFile(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => runBodyCsvImport(String(e.target.result||""));
  reader.onerror = () => { $("bodyCsvResult").textContent="Datei konnte nicht gelesen werden."; };
  reader.readAsText(file);
}
function vExEdit(){
  const id=viewArg, ex=S.exercises[id]; if(!ex) return vSettings();
  const sec = ex.unit==="seconds";
  const inPlan = t => S.plan[t].includes(id);
  return `<div class="row"><h1 class="grow">Übung</h1>
    <button class="btn ghost" onclick="go('settings')">‹ Zurück</button></div>
  <div class="card">
    <label class="lbl">Name</label>
    <input type="text" value="${esc(ex.name)}" oninput="S.exercises['${id}'].name=this.value;save()" style="margin:6px 0 14px">
    <div class="row"><div class="grow"><b>Pro Seite</b><div class="mut">Gewicht gilt je Seite (×2 fürs Volumen)</div></div>
      <button class="btn" onclick="S.exercises['${id}'].perSide=!S.exercises['${id}'].perSide;save();render()">${ex.perSide?"Ja":"Nein"}</button></div>
    ${sec?"":`
    <div class="row" style="margin-top:14px"><div class="grow"><b>Rep-Range</b></div>
      <div class="step"><button onclick="S.exercises['${id}'].repMin=Math.max(1,S.exercises['${id}'].repMin-1);save();render()">−</button>
        <div class="val">${ex.repMin}</div>
        <button onclick="S.exercises['${id}'].repMin++;save();render()">+</button></div>
      <span class="mut">–</span>
      <div class="step"><button onclick="S.exercises['${id}'].repMax=Math.max(S.exercises['${id}'].repMin,S.exercises['${id}'].repMax-1);save();render()">−</button>
        <div class="val">${ex.repMax}</div>
        <button onclick="S.exercises['${id}'].repMax++;save();render()">+</button></div></div>`}
    <div class="row" style="margin-top:14px"><div class="grow"><b>Gewichtsschritt</b><div class="mut">Verfügbares Maschinen-/Hantel-Inkrement</div></div>
      <div class="step"><button onclick="S.exercises['${id}'].increment=Math.max(0.25,+(S.exercises['${id}'].increment-(${sec}?5:1.25)).toFixed(2));save();render()">−</button>
        <div class="val">${fmt(ex.increment)}<span class="unit">${sec?"s":"kg"}</span></div>
        <button onclick="S.exercises['${id}'].increment=+(S.exercises['${id}'].increment+(${sec}?5:1.25)).toFixed(2);save();render()">+</button></div></div>
    <div class="row" style="margin-top:14px"><div class="grow"><b>Pausenzeit</b><div class="mut">Eigene Pause für diese Übung (sonst Standard ${S.settings.restSeconds}s)</div></div>
      <div class="step"><button onclick="setExRest('${id}',-15)">−</button>
        <div class="val">${ex.restSeconds?ex.restSeconds:"–"}<span class="unit">${ex.restSeconds?"s":"std"}</span></div>
        <button onclick="setExRest('${id}',15)">+</button></div></div>
    <div style="margin-top:14px"><b>Muskelgruppe</b><div class="mut" style="margin-bottom:8px">Für Satz-Statistik & Ersatzübungen</div>
      <select onchange="S.exercises['${id}'].muscle=this.value;save();render()">
        ${Object.keys(MUSCLES).map(mu=>`<option value="${mu}" ${(ex.muscle||"other")===mu?"selected":""}>${MUSCLES[mu].name}</option>`).join("")}
      </select></div>
  </div>
  <div class="card"><b>Im Plan enthalten</b>
    <div class="row" style="margin-top:10px">
      ${Object.keys(TYPES).map(t=>`<button class="btn grow ${TYPES[t].cls} ${inPlan(t)?"accent":""}"
        onclick="togglePlan('${t}','${id}')">${TYPES[t].label}</button>`).join("")}
    </div></div>`;
}
function togglePlan(t,id){
  const p=S.plan[t], i=p.indexOf(id);
  if (i>=0) p.splice(i,1); else p.push(id);
  save(); render();
}

/* ================= INIT ================= */
(async function(){
  await loadState();
  if (S.draft && !S.draft.startedAt) S.draft.startedAt = Date.now(); /* v1.4 */
  if (!S.gami) S.gami = { skin:null }; /* v1.5 */
  /* v1.8: XP / Fähigkeiten / Easter Eggs */
  if (!S.gami.xpBonus)        S.gami.xpBonus = 0;        /* einmalige Bonus-XP (Dates, Milestones) */
  if (!S.gami.abilities)      S.gami.abilities = {};      /* {abilityKey: true} freigeschaltet */
  if (!S.gami.eggsSeen)       S.gami.eggsSeen = {};       /* {eggKey: "YYYY-MM-DD"} zuletzt gesehen */
  if (!S.gami.milestonesSeen) S.gami.milestonesSeen = {}; /* {key: true} einmalig angezeigt */
  /* v3.0: Münzen-Ökonomie + Prestige */
  if (S.gami.spent==null)      S.gami.spent = 0;          /* ausgegebene Münzen */
  if (!S.gami.owned)           S.gami.owned = {};         /* {skinKey: true} gekaufte Kosmetik */
  if (S.gami.prestige==null)   S.gami.prestige = 0;       /* Anzahl Wiedergeburten */
  if (S.gami.prestigeVariant===undefined) S.gami.prestigeVariant = null;
  if (S.gami.lastRankSeen==null){ try{ S.gami.lastRankSeen = computeGami().rank.key; }catch(e){ S.gami.lastRankSeen="holz"; } } /* für Aufstiegs-Zeremonie (Welle B) — initial = aktueller Rang, kein Retro-Trigger */
  /* v3.0 Welle C */
  if (S.gami.bonusCoins==null) S.gami.bonusCoins = 0;      /* Münz-Boni aus Quests, Boss, Ketten */
  if (!S.gami.trophies)        S.gami.trophies = {};        /* {key:{ts,kind,name}} */
  if (!S.gami.completedChains) S.gami.completedChains = []; /* abgeschlossene Ketten-IDs */
  if (!S.gami.boss)            S.gami.boss = {};             /* {YYYY-MM:"defeated"} */
  if (S.gami.daily===undefined) S.gami.daily = null;        /* Tagesquest-State */
  if (!S.gami.chain)           S.gami.chain = null;         /* aktive Story-Kette */
  /* v1.6: Muskelgruppen nachtragen (alte Daten ohne muscle) */
  const MUMAP={flachbank:"chest",schraegbank:"chest",cablefly:"chest",schulterdruecken:"shoulders",seitheben:"shoulders",
    trizeps:"triceps",latzug:"back",kabelrudern:"back",facepulls:"back",preacher:"biceps",hammercurl:"biceps",
    beinpresse:"quads",beinstrecker:"quads",rdl:"hamstrings",beinbeuger:"hamstrings",plank:"core"};
  for (const id in S.exercises){ if(!S.exercises[id].muscle) S.exercises[id].muscle = MUMAP[id] || "other"; }
  /* v1.7: Körpermetriken-Array nachtragen */
  if (!S.bodyweight.metrics) S.bodyweight.metrics = [];
  /* v2.0: Sync-Metadaten (jüngeres updatedAt gewinnt beim Cloud-Abgleich) */
  if (!S.updatedAt) S.updatedAt = Date.now();
  if (!S.lastDevice) S.lastDevice = deviceLabel();
  render();
  bootSync();   /* v2.0: optionaler stiller Cloud-Abgleich beim Start (nur wenn Auto-Sync an) */

  /* ================= v1.9: SWIPE GESTURES ================= */
  const TAB_ORDER = ["home","history","charts","report","marble","settings"];
  let swipeStartX=0, swipeStartY=0, swipeStartView="";
  document.addEventListener("touchstart", e=>{
    swipeStartX=e.touches[0].clientX;
    swipeStartY=e.touches[0].clientY;
    swipeStartView=view;
  }, {passive:true});
  document.addEventListener("touchend", e=>{
    const dx=e.changedTouches[0].clientX - swipeStartX;
    const dy=e.changedTouches[0].clientY - swipeStartY;
    /* Only horizontal swipes wider than 60px that are more horizontal than vertical */
    if (Math.abs(dx)<60 || Math.abs(dy)>Math.abs(dx)*0.7) return;
    /* Don't swipe inside a bottom sheet, scrollable chip row, or during session if swiping right */
    if (document.getElementById("sheet-bg")) return;
    const mainViews = ["home","history","charts","report","marble","settings"];
    const idx = mainViews.indexOf(swipeStartView);
    if (idx<0) return; /* don't swipe on session/detail sub-views */
    const next = dx<0 ? mainViews[idx+1] : mainViews[idx-1];
    if (next) go(next);
  }, {passive:true});
})();
</script>
